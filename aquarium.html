<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquarium Messwerte</title>
<style>
  :root {
    --bg:#0e0f11;--surface:#16181c;--card:#1e2128;--border:#2a2d35;
    --accent:#4facfe;--accent2:#00d4ff;
    --text:#f0f0ed;--muted:#6b7080;
    --danger:#f54747;--warn:#f5a547;--ok:#47f57a;
    --radius:14px;
  }
  * { box-sizing:border-box;margin:0;padding:0; }
  body { background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding:0 0 100px 0; }

  /* Header */
  .header { padding:28px 20px 0; }
  .header-label { font-size:10px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:4px; }
  .header h1 { font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1.1; }
  .header-meta { font-size:11px;color:var(--muted);margin-top:6px; }

  /* Stats */
  .stats { display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:20px 20px 0; }
  .stat-box { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center; }
  .stat-value { font-size:20px;font-weight:700;color:var(--accent);line-height:1; }
  .stat-value.ok   { color:var(--ok); }
  .stat-value.warn { color:var(--warn); }
  .stat-value.danger { color:var(--danger); }
  .stat-label { font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.1em; }

  /* Formular */
  .form-card { margin:20px 20px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .3s; }
  .form-card.edit-mode { border-color:var(--accent2); }
  .form-title { font-size:13px;font-weight:700;letter-spacing:.05em;color:var(--accent);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px; }
  .form-title::before { content:'';display:block;width:8px;height:8px;background:var(--accent);border-radius:50%; }
  .form-card.edit-mode .form-title { color:var(--accent2); }
  .form-card.edit-mode .form-title::before { background:var(--accent2); }

  .field-row { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
  .field { margin-bottom:10px; }
  label { display:block;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:5px; }
  input { width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none; }
  input:focus { border-color:var(--accent); }
  input::placeholder { color:var(--muted); }

  .more-divider { display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px 0;color:var(--muted);font-size:12px;margin:2px 0;user-select:none; }
  .more-divider::before,.more-divider::after { content:'';flex:1;height:1px;background:var(--border); }
  .more-fields { display:none; }
  .more-fields.open { display:block; }

  .btn-add { width:100%;margin-top:14px;background:var(--accent);color:#0e0f11;border:none;border-radius:10px;padding:15px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer; }
  .btn-add:active { opacity:.8; }
  .btn-cancel { width:100%;margin-top:8px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:inherit;font-size:14px;cursor:pointer; }

  /* Liste */
  .list-header { display:flex;justify-content:space-between;align-items:center;padding:20px 20px 0;gap:8px; }
  .list-title { font-size:14px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.05em;flex:1; }
  .sync-dot { width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0; }
  .sync-dot.ok  { background:var(--ok); }
  .sync-dot.err { background:var(--danger); }
  .btn-refresh { background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1; }
  .monat-select { background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:inherit;font-size:12px;padding:7px 10px;outline:none;cursor:pointer; }
  .monat-select:focus { border-color:var(--accent); }

  .mess-list { padding:12px 20px 0;display:flex;flex-direction:column;gap:8px; }

  .mess-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;transition:border-color .2s; }
  .mess-card.has-danger { border-color:rgba(245,71,71,.4); }
  .mess-card.has-warn   { border-color:rgba(245,165,71,.25); }

  .mess-top { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px; }
  .mess-date { font-size:15px;font-weight:700;color:var(--text); }
  .mess-days { font-size:11px;color:var(--muted);margin-top:1px; }
  .overall-dot { width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0; }
  .overall-dot.ok     { background:var(--ok); }
  .overall-dot.warn   { background:var(--warn); }
  .overall-dot.danger { background:var(--danger); }

  .mess-values { display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px; }
  .val-badge { display:inline-flex;align-items:baseline;gap:3px;border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:12px;color:var(--muted); }
  .val-badge .val-name { font-size:9px;text-transform:uppercase;letter-spacing:.05em;opacity:.7; }
  .val-badge.ok     { border-color:rgba(71,245,122,.4);color:var(--ok); }
  .val-badge.warn   { border-color:rgba(245,165,71,.4);color:var(--warn); }
  .val-badge.danger { border-color:rgba(245,71,71,.5);color:var(--danger); }

  .mess-notiz { font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;margin-top:6px; }

  .btn-del,.btn-edit { position:absolute;top:10px;display:none;border:none;border-radius:6px;width:26px;height:26px;cursor:pointer;align-items:center;justify-content:center;font-size:14px; }
  .btn-del  { right:10px;background:var(--danger);color:white; }
  .btn-edit { right:42px;background:var(--accent2);color:#0e0f11; }
  .mess-card:hover .btn-del,.mess-card:hover .btn-edit,
  .mess-card:active .btn-del,.mess-card:active .btn-edit { display:flex; }

  .empty-state { text-align:center;padding:40px 20px;color:var(--muted);font-size:13px; }
  .empty-icon  { font-size:40px;margin-bottom:12px;opacity:.4; }

  /* Erinnerungs-Banner */
  .reminder-banner { margin:16px 20px 0;background:linear-gradient(135deg,#0f1e35,#112240);border:1px solid var(--accent);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px; }
  .reminder-icon { font-size:26px;flex-shrink:0; }
  .reminder-text { flex:1;min-width:0; }
  .reminder-text strong { display:block;font-size:13px;color:var(--accent);margin-bottom:2px; }
  .reminder-text span   { font-size:11px;color:var(--muted); }
  .btn-reminder { background:var(--accent);color:#0e0f11;border:none;border-radius:8px;padding:8px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0; }
  .btn-reminder:active { opacity:.8; }

  /* Einstellungen */
  .settings-section { margin:20px 20px 0; }
  .settings-toggle { font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);user-select:none; }
  .settings-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px; }
  .settings-row { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px; }
  .btn-save-settings { background:var(--accent);color:#0e0f11;border:none;border-radius:8px;padding:10px 20px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer; }
  .btn-notif { width:100%;margin-top:10px;background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:10px;font-family:inherit;font-size:12px;cursor:pointer; }
  .notif-status { font-size:11px;color:var(--muted);margin-top:6px; }

  /* Toast */
  .toast { position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#0e0f11;border-radius:30px;padding:10px 22px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap; }
  .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Aquarium</div>
  <h1 id="aquariumName">Mein Aquarium</h1>
  <div class="header-meta" id="headerMeta">Noch keine Messungen</div>
</div>

<div class="reminder-banner" id="reminderBanner" style="display:none">
  <div class="reminder-icon">💧</div>
  <div class="reminder-text">
    <strong id="reminderTitle">Zeit für eine Messung!</strong>
    <span id="reminderSub">Erinnerungsintervall erreicht</span>
  </div>
  <button class="btn-reminder" onclick="scrollToForm()">Jetzt messen</button>
</div>

<div class="stats">
  <div class="stat-box">
    <div class="stat-value" id="statMessungen">0</div>
    <div class="stat-label">Messungen</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="statPh">—</div>
    <div class="stat-label">pH (zuletzt)</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="statTemp">—</div>
    <div class="stat-label">Temp °C</div>
  </div>
</div>

<div class="form-card" id="formCard">
  <div class="form-title" id="formTitle">Messung eintragen</div>

  <div class="field">
    <label>Datum</label>
    <input type="date" id="fDatum">
  </div>

  <div class="field-row">
    <div class="field">
      <label>pH-Wert</label>
      <input type="number" id="fPh" placeholder="z.B. 7.2" step="0.1" min="0" max="14">
    </div>
    <div class="field">
      <label>Temperatur (°C)</label>
      <input type="number" id="fTemp" placeholder="z.B. 26" step="0.1" min="0" max="40">
    </div>
  </div>

  <div class="more-divider" onclick="toggleMore()">
    <span id="moreLabel">+ Weitere Werte</span>
  </div>

  <div class="more-fields" id="moreFields">
    <div class="field-row">
      <div class="field">
        <label>NO₂ Nitrit (mg/L)</label>
        <input type="number" id="fNo2" placeholder="z.B. 0" step="0.01" min="0">
      </div>
      <div class="field">
        <label>NO₃ Nitrat (mg/L)</label>
        <input type="number" id="fNo3" placeholder="z.B. 10" step="1" min="0">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>NH₄ Ammonium (mg/L)</label>
        <input type="number" id="fNh4" placeholder="z.B. 0" step="0.01" min="0">
      </div>
      <div class="field">
        <label>KH Karbonathärte (°dH)</label>
        <input type="number" id="fKh" placeholder="z.B. 8" step="0.5" min="0">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>GH Gesamthärte (°dH)</label>
        <input type="number" id="fGh" placeholder="z.B. 12" step="0.5" min="0">
      </div>
      <div class="field">
        <label>PO₄ Phosphat (mg/L)</label>
        <input type="number" id="fPo4" placeholder="z.B. 0.5" step="0.1" min="0">
      </div>
    </div>
  </div>

  <div class="field">
    <label>Notiz</label>
    <input type="text" id="fNotiz" placeholder="Optionale Bemerkung...">
  </div>

  <button class="btn-add" id="btnAdd" onclick="saveMeasurement()">Messung speichern</button>
  <button class="btn-cancel" id="btnCancel" onclick="cancelEdit()" style="display:none">Abbrechen</button>
</div>

<div class="list-header">
  <div class="list-title">Messungen</div>
  <div class="sync-dot" id="syncDot"></div>
  <button class="btn-refresh" onclick="loadData()" title="Aktualisieren">↻</button>
  <select class="monat-select" id="monatSelect" onchange="renderList()">
    <option value="all">Alle</option>
  </select>
</div>

<div class="mess-list" id="messList"></div>

<div class="settings-section">
  <div class="settings-toggle" onclick="toggleSettings()">
    <span>Einstellungen</span>
    <span id="settingsArrow">▼</span>
  </div>
  <div id="settingsPanel" style="display:none">
    <div class="settings-card">
      <div class="settings-row">
        <div class="field">
          <label>Aquarium Name</label>
          <input type="text" id="sName" placeholder="Mein Aquarium">
        </div>
        <div class="field">
          <label>Erinnerung alle (Tage)</label>
          <input type="number" id="sErinnerung" placeholder="7" min="1" max="365">
        </div>
      </div>
      <button class="btn-save-settings" onclick="saveSettings()">Speichern</button>
      <button class="btn-notif" id="btnNotif" onclick="requestNotification()">Benachrichtigungen erlauben</button>
      <div class="notif-status" id="notifStatus"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://tonibader.synology.me/aquarium-api.php';
const KEY = 'aq_m7nK3pRx5wYz';

const RANGES = {
  ph:   { ok:[6.5,7.5],  warn:[6.0,8.0],  unit:'',     name:'pH'   },
  temp: { ok:[24,28],    warn:[20,30],     unit:'°C',   name:'Temp' },
  no2:  { ok:[0,0.1],    warn:[0,0.5],     unit:'mg/L', name:'NO₂'  },
  no3:  { ok:[0,25],     warn:[0,50],      unit:'mg/L', name:'NO₃'  },
  nh4:  { ok:[0,0.1],    warn:[0,0.5],     unit:'mg/L', name:'NH₄'  },
  kh:   { ok:[5,10],     warn:[3,15],      unit:'°dH',  name:'KH'   },
  gh:   { ok:[8,15],     warn:[5,20],      unit:'°dH',  name:'GH'   },
  po4:  { ok:[0,1.0],    warn:[0,2.0],     unit:'mg/L', name:'PO₄'  }
};

let messungen = [];
let settings  = { erinnerung_tage:7, aquarium_name:'Mein Aquarium' };
let editId    = null;
let moreOpen  = false;

// --- Hilfsfunktionen ---

function getStatus(key, value) {
  if (value === null || value === undefined) return 'none';
  const r = RANGES[key];
  if (!r) return 'none';
  const v = parseFloat(value);
  if (isNaN(v)) return 'none';
  if (v >= r.ok[0]   && v <= r.ok[1])   return 'ok';
  if (v >= r.warn[0] && v <= r.warn[1]) return 'warn';
  return 'danger';
}

function daysSince(dateStr) {
  const now = new Date(); now.setHours(0,0,0,0);
  const d   = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.floor((now - d) / 86400000);
}

let toastTimer;
function showToast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? 'var(--danger)' : 'var(--accent)';
  t.style.color = err ? 'white' : '#0e0f11';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// --- Laden & Speichern ---

async function loadData() {
  try {
    const r = await fetch(API, { headers:{ 'X-API-Key':KEY } });
    if (!r.ok) throw new Error();
    const d  = await r.json();
    messungen = d.messungen || [];
    settings  = Object.assign({ erinnerung_tage:7, aquarium_name:'Mein Aquarium' }, d.settings);
    localStorage.setItem('aq_messungen', JSON.stringify(messungen));
    setSyncDot(true);
  } catch {
    setSyncDot(false);
    showToast('Verbindungsfehler – lokale Daten', true);
    const local = localStorage.getItem('aq_messungen');
    if (local) messungen = JSON.parse(local);
  }
  updateUI();
}

async function saveToBackend() {
  try {
    const r = await fetch(API, {
      method:'POST',
      headers:{ 'X-API-Key':KEY, 'Content-Type':'application/json' },
      body: JSON.stringify(messungen)
    });
    if (!r.ok) throw new Error();
    localStorage.setItem('aq_messungen', JSON.stringify(messungen));
    setSyncDot(true);
  } catch {
    setSyncDot(false);
    showToast('Speichern fehlgeschlagen', true);
  }
}

// --- Liste ---

function getOverallStatus(m) {
  const keys = ['ph','temp','no2','no3','nh4','kh','gh','po4'];
  let worst = 'none';
  for (const k of keys) {
    const s = getStatus(k, m[k]);
    if (s === 'danger') return 'danger';
    if (s === 'warn')   worst = 'warn';
    else if (s === 'ok' && worst === 'none') worst = 'ok';
  }
  return worst;
}

function updateMonatSelect() {
  const sel     = document.getElementById('monatSelect');
  const current = sel.value;
  const months  = new Set();
  messungen.forEach(m => {
    const d = new Date(m.datum);
    months.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  });
  sel.innerHTML = '<option value="all">Alle</option>';
  [...months].sort().reverse().forEach(ym => {
    const [y, mo] = ym.split('-');
    const label   = new Date(y, mo-1, 1).toLocaleString('de', {month:'long', year:'numeric'});
    const opt     = document.createElement('option');
    opt.value     = ym;
    opt.textContent = label;
    sel.appendChild(opt);
  });
  if (current && current !== 'all') {
    sel.value = sel.querySelector(`option[value="${current}"]`) ? current : 'all';
  }
}

function renderList() {
  const filter   = document.getElementById('monatSelect').value;
  let filtered   = filter === 'all' ? messungen : messungen.filter(m => m.datum.startsWith(filter));
  filtered       = [...filtered].sort((a,b) => b.datum.localeCompare(a.datum));
  const list     = document.getElementById('messList');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔬</div><div>Keine Messungen vorhanden</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(renderCard).join('');
}

function renderCard(m) {
  const dateStr = new Date(m.datum).toLocaleDateString('de', {day:'2-digit', month:'2-digit', year:'numeric'});
  const days    = daysSince(m.datum);
  const daysStr = days === 0 ? 'Heute' : days === 1 ? 'Gestern' : `vor ${days} Tagen`;
  const overall = getOverallStatus(m);

  const badges = Object.entries(RANGES)
    .filter(([k]) => m[k] != null)
    .map(([k, r]) => {
      const s = getStatus(k, m[k]);
      return `<span class="val-badge ${s === 'none' ? '' : s}"><span class="val-name">${r.name}</span>${m[k]}${r.unit}</span>`;
    }).join('');

  const notizHtml = m.notiz
    ? `<div class="mess-notiz">${m.notiz}</div>`
    : '';

  const cardClass = overall === 'danger' ? ' has-danger' : overall === 'warn' ? ' has-warn' : '';
  const dotHtml   = overall !== 'none'
    ? `<div class="overall-dot ${overall}"></div>`
    : '';

  return `<div class="mess-card${cardClass}">
    <button class="btn-edit" onclick="startEdit('${m.id}')">✏</button>
    <button class="btn-del"  onclick="deleteMeasurement('${m.id}')">✕</button>
    <div class="mess-top">
      <div>
        <div class="mess-date">${dateStr}</div>
        <div class="mess-days">${daysStr}</div>
      </div>
      ${dotHtml}
    </div>
    ${badges ? `<div class="mess-values">${badges}</div>` : ''}
    ${notizHtml}
  </div>`;
}

function deleteMeasurement(id) {
  if (!confirm('Messung löschen?')) return;
  messungen = messungen.filter(m => m.id !== id);
  saveToBackend();
  updateUI();
  showToast('Messung gelöscht');
}

function startEdit(id) {
  const m = messungen.find(x => x.id === id);
  if (!m) return;
  editId = id;

  document.getElementById('fDatum').value = m.datum  ?? '';
  document.getElementById('fPh').value    = m.ph     ?? '';
  document.getElementById('fTemp').value  = m.temp   ?? '';
  document.getElementById('fNo2').value   = m.no2    ?? '';
  document.getElementById('fNo3').value   = m.no3    ?? '';
  document.getElementById('fNh4').value   = m.nh4    ?? '';
  document.getElementById('fKh').value    = m.kh     ?? '';
  document.getElementById('fGh').value    = m.gh     ?? '';
  document.getElementById('fPo4').value   = m.po4    ?? '';
  document.getElementById('fNotiz').value = m.notiz  ?? '';

  if (!moreOpen) toggleMore();
  document.getElementById('formCard').classList.add('edit-mode');
  document.getElementById('formTitle').textContent   = 'Messung bearbeiten';
  document.getElementById('btnAdd').textContent      = 'Aktualisieren';
  document.getElementById('btnCancel').style.display = 'block';
  document.getElementById('formCard').scrollIntoView({behavior:'smooth'});
}

function setSyncDot(ok) {
  document.getElementById('syncDot').className = 'sync-dot' + (ok ? ' ok' : ' err');
}

// --- UI ---

function updateHeader() {
  const name   = settings.aquarium_name || 'Mein Aquarium';
  document.getElementById('aquariumName').textContent = name;
  document.title = name + ' – Messwerte';
  const n      = messungen.length;
  const sorted = [...messungen].sort((a,b) => b.datum.localeCompare(a.datum));
  const last   = sorted[0];
  if (n === 0) {
    document.getElementById('headerMeta').textContent = 'Noch keine Messungen';
  } else {
    const days = daysSince(last.datum);
    const dStr = days === 0 ? 'Heute' : days === 1 ? 'Gestern' : `vor ${days} Tagen`;
    document.getElementById('headerMeta').textContent =
      `${n} Messung${n !== 1 ? 'en' : ''} · Letzte: ${dStr}`;
  }
}

function updateUI() {
  updateHeader();

  const sorted = [...messungen].sort((a,b) => b.datum.localeCompare(a.datum));
  const last   = sorted[0];
  const n      = messungen.length;

  // Stats
  document.getElementById('statMessungen').textContent = n;
  document.getElementById('statMessungen').className   = 'stat-value';

  const phEl   = document.getElementById('statPh');
  const tempEl = document.getElementById('statTemp');

  if (last && last.ph != null) {
    phEl.textContent = last.ph;
    phEl.className   = 'stat-value ' + getStatus('ph', last.ph);
  } else {
    phEl.textContent = '—';
    phEl.className   = 'stat-value';
  }

  if (last && last.temp != null) {
    tempEl.textContent = last.temp + '°';
    tempEl.className   = 'stat-value ' + getStatus('temp', last.temp);
  } else {
    tempEl.textContent = '—';
    tempEl.className   = 'stat-value';
  }

  updateMonatSelect();
  renderList();
  checkReminder();
  updateSettingsForm();
}

// --- Formular ---

function toggleMore() {
  moreOpen = !moreOpen;
  document.getElementById('moreFields').className = 'more-fields' + (moreOpen ? ' open' : '');
  document.getElementById('moreLabel').textContent = moreOpen ? '− Weniger Werte' : '+ Weitere Werte';
}

function getF(id) {
  const v = document.getElementById(id).value;
  return v === '' ? null : parseFloat(v);
}

function resetForm() {
  ['fPh','fTemp','fNo2','fNo3','fNh4','fKh','fGh','fPo4','fNotiz'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('fDatum').value = new Date().toISOString().slice(0,10);
}

function cancelEdit() {
  editId = null;
  resetForm();
  document.getElementById('formCard').classList.remove('edit-mode');
  document.getElementById('formTitle').textContent  = 'Messung eintragen';
  document.getElementById('btnAdd').textContent     = 'Messung speichern';
  document.getElementById('btnCancel').style.display = 'none';
}

function saveMeasurement() {
  const datum = document.getElementById('fDatum').value;
  if (!datum) { showToast('Datum fehlt!', true); return; }

  const entry = {
    id:    editId || Date.now().toString(),
    datum,
    ph:    getF('fPh'),
    temp:  getF('fTemp'),
    no2:   getF('fNo2'),
    no3:   getF('fNo3'),
    nh4:   getF('fNh4'),
    kh:    getF('fKh'),
    gh:    getF('fGh'),
    po4:   getF('fPo4'),
    notiz: document.getElementById('fNotiz').value.trim() || null
  };

  if (editId) {
    const idx = messungen.findIndex(m => m.id === editId);
    if (idx !== -1) messungen[idx] = entry;
    showToast('Messung aktualisiert');
    cancelEdit();
  } else {
    messungen.push(entry);
    showToast('Messung gespeichert');
    resetForm();
  }

  saveToBackend();
  updateUI();
}

// --- Erinnerung ---

function checkReminder() {
  const banner = document.getElementById('reminderBanner');
  if (messungen.length === 0) { banner.style.display = 'none'; return; }

  const sorted   = [...messungen].sort((a,b) => b.datum.localeCompare(a.datum));
  const days     = daysSince(sorted[0].datum);
  const interval = settings.erinnerung_tage || 7;

  if (days >= interval) {
    document.getElementById('reminderTitle').textContent =
      days === 0 ? 'Heute messen!' : `${days} Tag${days !== 1 ? 'e' : ''} seit der letzten Messung`;
    document.getElementById('reminderSub').textContent =
      `Erinnerungsintervall: alle ${interval} Tage`;
    banner.style.display = 'flex';

    // Browser-Benachrichtigung – max. einmal pro Tag
    const today    = new Date().toDateString();
    const lastSent = localStorage.getItem('aq_last_notif');
    if (lastSent !== today && Notification.permission === 'granted') {
      new Notification('Aquarium-Messung fällig!', {
        body: `${days} Tag${days !== 1 ? 'e' : ''} seit der letzten Messung – jetzt messen!`,
        tag:  'aq-reminder'
      });
      localStorage.setItem('aq_last_notif', today);
    }
  } else {
    banner.style.display = 'none';
  }
}

function scrollToForm() {
  document.getElementById('formCard').scrollIntoView({behavior:'smooth'});
}

// --- Einstellungen ---

let settingsOpen = false;

function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settingsPanel').style.display = settingsOpen ? 'block' : 'none';
  document.getElementById('settingsArrow').textContent   = settingsOpen ? '▲' : '▼';
}

function updateSettingsForm() {
  document.getElementById('sName').value       = settings.aquarium_name  || '';
  document.getElementById('sErinnerung').value = settings.erinnerung_tage || 7;
  updateNotifStatus();
}

async function saveSettings() {
  settings.aquarium_name   = document.getElementById('sName').value.trim() || 'Mein Aquarium';
  settings.erinnerung_tage = parseInt(document.getElementById('sErinnerung').value) || 7;
  try {
    await fetch(API + '?action=settings', {
      method:'POST',
      headers:{ 'X-API-Key':KEY, 'Content-Type':'application/json' },
      body: JSON.stringify(settings)
    });
  } catch { /* ignorieren – lokal gespeichert */ }
  updateHeader();
  checkReminder();
  showToast('Einstellungen gespeichert');
}

// --- Browser-Benachrichtigungen ---

function updateNotifStatus() {
  const btn    = document.getElementById('btnNotif');
  const status = document.getElementById('notifStatus');
  if (!('Notification' in window)) {
    btn.style.display = 'none';
    status.textContent = 'Benachrichtigungen werden von diesem Browser nicht unterstützt.';
    return;
  }
  if (Notification.permission === 'granted') {
    btn.textContent    = 'Test-Benachrichtigung senden';
    status.textContent = '✓ Benachrichtigungen sind aktiv';
  } else if (Notification.permission === 'denied') {
    btn.style.display  = 'none';
    status.textContent = 'Benachrichtigungen blockiert – bitte in den Browser-Einstellungen aktivieren.';
  } else {
    btn.textContent    = 'Benachrichtigungen erlauben';
    status.textContent = 'Erlaube Benachrichtigungen, um Erinnerungen zu erhalten.';
  }
}

async function requestNotification() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    new Notification('Aquarium Messwerte', { body:'Benachrichtigungen funktionieren!', tag:'aq-test' });
    return;
  }
  const perm = await Notification.requestPermission();
  updateNotifStatus();
  if (perm === 'granted') showToast('Benachrichtigungen aktiviert!');
}

// --- Init ---
document.getElementById('fDatum').value = new Date().toISOString().slice(0,10);
loadData();
</script>
