<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uhr Lernen</title>
<style>
  :root {
    --bg: #1a1f35;
    --card: #242b45;
    --accent: #ffd166;
    --green: #06d6a0;
    --red: #ef476f;
    --blue: #118ab2;
    --text: #f8f9fa;
    --muted: #8892b0;
    --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  h1 { font-size: 1.8rem; font-weight: 900; color: var(--accent); text-align: center; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 14px; text-align: center; }

  .score-bar {
    display: flex; gap: 16px;
    background: var(--card); border-radius: 50px;
    padding: 8px 22px; margin-bottom: 14px;
    font-size: 1rem; font-weight: 700;
  }
  .score-bar span { color: var(--muted); font-weight: 400; margin-right: 4px; }
  .score-correct { color: var(--green); }
  .score-wrong { color: var(--red); }

  .mode-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .mode-tab {
    padding: 10px 18px; border-radius: 50px;
    border: 2px solid var(--card); background: var(--card);
    color: var(--muted); font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .mode-tab.active { border-color: var(--accent); color: var(--accent); background: #2e3555; }

  .card {
    background: var(--card); border-radius: var(--radius);
    padding: 22px 18px; width: 100%; max-width: 420px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }

  .question-text { font-size: 1rem; color: var(--muted); text-align: center; }
  .question-time { font-size: 2.4rem; font-weight: 900; color: var(--accent); text-align: center; letter-spacing: 2px; min-height: 2.8rem; }

  /* ── CLOCK ── */
  .clock-wrapper {
    position: relative;
    width: 280px; height: 280px;
    user-select: none; touch-action: none;
  }
  .clock-face {
    width: 280px; height: 280px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2e3a6e, #1a2248);
    border: 4px solid #3a4570;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    position: absolute; top: 0; left: 0;
  }
  svg.clock-svg {
    position: absolute; top: 0; left: 0;
    width: 280px; height: 280px;
    overflow: visible; cursor: pointer;
  }

  /* hand selector buttons */
  .hand-selector {
    display: flex; gap: 10px; width: 100%; max-width: 280px;
  }
  .hand-btn {
    flex: 1; padding: 12px 8px; border-radius: 14px;
    border: 2px solid #3a4570; background: #1a1f35;
    font-size: 0.85rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s; color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .hand-btn .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .hand-btn.hour-btn .dot { background: var(--accent); }
  .hand-btn.min-btn .dot { background: #f8f9fa; }
  .hand-btn.active { border-width: 3px; color: var(--text); }
  .hand-btn.hour-btn.active { border-color: var(--accent); background: #2e2a1a; }
  .hand-btn.min-btn.active { border-color: #ccc; background: #252530; }

  /* ── TIME INPUT ── */
  .time-split {
    display: flex; align-items: center; gap: 6px;
  }
  .time-split-field {
    width: 80px; font-size: 2.8rem; font-weight: 900; text-align: center;
    background: #1a1f35; border: 3px solid #3a4570; border-radius: 14px;
    color: var(--text); padding: 8px 4px; outline: none;
    transition: border-color 0.2s; -webkit-appearance: none;
    appearance: none; -moz-appearance: textfield;
  }
  .time-split-field::-webkit-inner-spin-button,
  .time-split-field::-webkit-outer-spin-button { -webkit-appearance: none; }
  .time-split-field:focus { border-color: var(--accent); }
  .time-colon { font-size: 2.8rem; font-weight: 900; color: var(--accent); line-height: 1; }
  .time-labels { display: flex; gap: 6px; }
  .time-label { width: 80px; text-align: center; font-size: 0.75rem; color: var(--muted); font-weight: 600; letter-spacing: .05em; }
  .time-label-sep { width: 26px; }

  /* ── FEEDBACK ── */
  .feedback {
    font-size: 1.4rem; font-weight: 900; text-align: center;
    min-height: 2rem; transition: opacity 0.3s;
  }
  .feedback.correct { color: var(--green); }
  .feedback.wrong { color: var(--red); }
  .feedback.hidden { opacity: 0; }

  /* ── BUTTONS ── */
  .btn {
    padding: 14px 36px; border-radius: 50px; border: none;
    font-size: 1.1rem; font-weight: 800; cursor: pointer;
    transition: all 0.15s; width: 100%; max-width: 280px;
  }
  .btn-check { background: var(--accent); color: #1a1f35; }
  .btn-check:hover { filter: brightness(1.1); transform: scale(1.02); }
  .btn-next { background: var(--blue); color: white; }
  .btn-next:hover { filter: brightness(1.1); transform: scale(1.02); }

  .difficulty-row {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 4px;
  }
  .diff-btn {
    padding: 6px 14px; border-radius: 50px; border: 2px solid #3a4570;
    background: transparent; color: var(--muted); font-size: 0.78rem;
    font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .diff-btn.active { border-color: var(--blue); color: #73c8e8; }

  @media (max-width: 360px) {
    .clock-wrapper, .clock-face, svg.clock-svg { width: 250px; height: 250px; }
    .time-split-field { width: 70px; font-size: 2.4rem; }
  }
</style>
</head>
<body>

<h1>🕐 Uhr Lernen</h1>
<p class="subtitle">Zeiger einstellen oder Zeit ablesen</p>

<div class="score-bar">
  <div><span>✅</span><span class="score-correct" id="scoreCorrect">0</span></div>
  <div><span>❌</span><span class="score-wrong" id="scoreWrong">0</span></div>
  <div><span>🔥</span><span id="streakDisplay">0</span></div>
</div>

<div class="difficulty-row">
  <button class="diff-btn active" onclick="setDifficulty('voll',this)">Volle Stunden</button>
  <button class="diff-btn" onclick="setDifficulty('halb',this)">+ Halbe</button>
  <button class="diff-btn" onclick="setDifficulty('viertel',this)">+ Viertel</button>
  <button class="diff-btn" onclick="setDifficulty('5min',this)">5-Min.</button>
  <button class="diff-btn" onclick="setDifficulty('alle',this)">Alle</button>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="setMode('set',this)">⏱ Zeiger einstellen</button>
  <button class="mode-tab" onclick="setMode('read',this)">🔢 Zeit eingeben</button>
</div>

<div class="card">
  <div class="question-text" id="questionText">Stelle die Zeiger auf:</div>
  <div class="question-time" id="questionTime"></div>

  <!-- CLOCK (used in both modes) -->
  <div class="clock-wrapper" id="clockWrapper">
    <div class="clock-face"></div>
    <svg class="clock-svg" id="clockSvg" viewBox="0 0 280 280"></svg>
  </div>

  <!-- Hand selector (set mode only) -->
  <div class="hand-selector" id="handSelector">
    <button class="hand-btn hour-btn active" id="btnHour" onclick="selectHand('hour')">
      <span class="dot"></span> Stundenzeiger
    </button>
    <button class="hand-btn min-btn" id="btnMin" onclick="selectHand('minute')">
      <span class="dot"></span> Minutenzeiger
    </button>
  </div>

  <!-- Split time input (read mode only) -->
  <div id="inputWrapper" style="display:none">
    <div class="time-split">
      <input type="number" class="time-split-field" id="inputH" placeholder="00" min="1" max="12" inputmode="numeric">
      <span class="time-colon">:</span>
      <input type="number" class="time-split-field" id="inputM" placeholder="00" min="0" max="59" inputmode="numeric">
    </div>
    <div class="time-labels">
      <div class="time-label">Stunden</div>
      <div class="time-label-sep"></div>
      <div class="time-label">Minuten</div>
    </div>
  </div>

  <div class="feedback hidden" id="feedback"></div>
  <button class="btn btn-check" id="btnCheck" onclick="checkAnswer()">Prüfen ✓</button>
  <button class="btn btn-next" id="btnNext" onclick="nextQuestion()" style="display:none">Weiter →</button>
</div>

<script>
  const CX = 140, CY = 140, R = 116;

  let mode = 'set';
  let difficulty = 'voll';
  let targetH = 3, targetM = 0;
  let userH = 12, userM = 0;
  let score = { correct: 0, wrong: 0, streak: 0 };
  let answered = false;
  let activeHand = 'hour'; // which hand to move in set-mode
  let isDragging = false;

  // ── Difficulty ────────────────────────────────────────────────────────────────
  function randomTime() {
    const pools = {
      voll:    [0],
      halb:    [0, 30],
      viertel: [0, 15, 30, 45],
      '5min':  [0,5,10,15,20,25,30,35,40,45,50,55],
      alle:    Array.from({length:60}, (_,i) => i),
    };
    const minutes = pools[difficulty];
    return {
      h: Math.floor(Math.random() * 12) + 1,
      m: minutes[Math.floor(Math.random() * minutes.length)],
    };
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  function init() {
    const t = randomTime();
    targetH = t.h; targetM = t.m;
    answered = false;
    isDragging = false;

    document.getElementById('feedback').className = 'feedback hidden';
    document.getElementById('feedback').textContent = '';
    document.getElementById('btnCheck').style.display = '';
    document.getElementById('btnNext').style.display = 'none';

    if (mode === 'set') {
      document.getElementById('questionText').textContent = 'Stelle die Zeiger auf:';
      document.getElementById('questionTime').textContent = formatTime(targetH, targetM);
      document.getElementById('handSelector').style.display = '';
      document.getElementById('inputWrapper').style.display = 'none';
      userH = 12; userM = 0;
      activeHand = 'hour';
      updateHandButtons();
      drawClock(userH, userM, false);
    } else {
      document.getElementById('questionText').textContent = 'Wie viel Uhr ist es?';
      document.getElementById('questionTime').textContent = '';
      document.getElementById('handSelector').style.display = 'none';
      document.getElementById('inputWrapper').style.display = '';
      document.getElementById('inputH').value = '';
      document.getElementById('inputM').value = '';
      setTimeout(() => document.getElementById('inputH').focus(), 80);
      drawClock(targetH, targetM, false);
    }
  }

  function formatTime(h, m) {
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} Uhr`;
  }

  // ── Hand selection ────────────────────────────────────────────────────────────
  function selectHand(hand) {
    activeHand = hand;
    updateHandButtons();
  }

  function updateHandButtons() {
    document.getElementById('btnHour').classList.toggle('active', activeHand === 'hour');
    document.getElementById('btnMin').classList.toggle('active', activeHand === 'minute');
  }

  // ── Clock Drawing ──────────────────────────────────────────────────────────────
  function drawClock(h, m, showAnswer) {
    const svg = document.getElementById('clockSvg');
    svg.innerHTML = '';

    // Tick marks
    for (let i = 0; i < 60; i++) {
      const angle = (i / 60) * 2 * Math.PI - Math.PI / 2;
      const isHour = i % 5 === 0;
      const outer = R;
      const inner = isHour ? R - 16 : R - 9;
      const line = makeSVG('line', {
        x1: CX + outer * Math.cos(angle), y1: CY + outer * Math.sin(angle),
        x2: CX + inner * Math.cos(angle), y2: CY + inner * Math.sin(angle),
        stroke: isHour ? '#8892b0' : '#3a4570',
        'stroke-width': isHour ? 2.5 : 1.5,
      });
      svg.appendChild(line);
    }

    // Hour numbers
    for (let i = 1; i <= 12; i++) {
      const angle = (i / 12) * 2 * Math.PI - Math.PI / 2;
      const txt = makeSVG('text', {
        x: CX + (R - 28) * Math.cos(angle),
        y: CY + (R - 28) * Math.sin(angle),
        'text-anchor': 'middle', 'dominant-baseline': 'central',
        fill: '#c0caf5', 'font-size': '16', 'font-weight': '700',
      });
      txt.textContent = i;
      svg.appendChild(txt);
    }

    // Hour hand (moves with minutes too)
    const hColor = showAnswer ? '#06d6a0' : (activeHand === 'hour' && mode === 'set' ? '#ffdf44' : '#ffd166');
    const hAngle = ((h % 12) / 12 + m / 720) * 2 * Math.PI - Math.PI / 2;
    drawHand(svg, hAngle, 66, 9, hColor, 'hour');

    // Minute hand
    const mColor = showAnswer ? '#06d6a0' : (activeHand === 'minute' && mode === 'set' ? '#ffffff' : '#d0d8f0');
    const mAngle = (m / 60) * 2 * Math.PI - Math.PI / 2;
    drawHand(svg, mAngle, 94, 6, mColor, 'minute');

    // Center
    svg.appendChild(makeSVG('circle', { cx: CX, cy: CY, r: 8, fill: '#ffd166' }));
  }

  function drawHand(svg, angle, length, width, color, id) {
    svg.appendChild(makeSVG('line', {
      x1: CX, y1: CY,
      x2: CX + length * Math.cos(angle),
      y2: CY + length * Math.sin(angle),
      stroke: color, 'stroke-width': width, 'stroke-linecap': 'round',
    }));
  }

  function makeSVG(tag, attrs) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  // ── Pointer events (unified mouse + touch) ────────────────────────────────────
  const svg = document.getElementById('clockSvg');

  svg.addEventListener('pointerdown', e => {
    if (mode !== 'set' || answered) return;
    isDragging = true;
    svg.setPointerCapture(e.pointerId);
    applyPointer(e);
  });

  svg.addEventListener('pointermove', e => {
    if (!isDragging) return;
    applyPointer(e);
  });

  svg.addEventListener('pointerup', () => { isDragging = false; });
  svg.addEventListener('pointercancel', () => { isDragging = false; });

  function applyPointer(e) {
    const rect = svg.getBoundingClientRect();
    const scaleX = 280 / rect.width;
    const scaleY = 280 / rect.height;
    const dx = (e.clientX - rect.left) * scaleX - CX;
    const dy = (e.clientY - rect.top) * scaleY - CY;
    const angle = Math.atan2(dy, dx);
    const norm = (angle + Math.PI / 2 + 2 * Math.PI) % (2 * Math.PI);

    if (activeHand === 'minute') {
      userM = Math.round((norm / (2 * Math.PI)) * 60) % 60;
    } else {
      userH = Math.round((norm / (2 * Math.PI)) * 12) % 12 || 12;
    }
    drawClock(userH, userM, false);
  }

  // ── Auto-advance hours → minutes field ────────────────────────────────────────
  document.getElementById('inputH').addEventListener('input', e => {
    const v = e.target.value;
    if (v.length >= 2 || parseInt(v) > 1) {
      document.getElementById('inputM').focus();
      document.getElementById('inputM').select();
    }
  });

  // ── Answer checking ────────────────────────────────────────────────────────────
  function checkAnswer() {
    if (answered) return;
    answered = true;

    let correct = false;
    if (mode === 'set') {
      correct = (userH % 12) === (targetH % 12) && userM === targetM;
      if (!correct) drawClock(targetH, targetM, true);
    } else {
      const ih = parseInt(document.getElementById('inputH').value) || 0;
      const im = parseInt(document.getElementById('inputM').value);
      correct = (ih % 12 || 12) === targetH && im === targetM;
      if (!correct) {
        drawClock(targetH, targetM, true);
        document.getElementById('questionTime').textContent = '→ ' + formatTime(targetH, targetM);
      }
    }

    const fb = document.getElementById('feedback');
    if (correct) {
      score.correct++; score.streak++;
      fb.textContent = score.streak >= 3 ? `🔥 Richtig! ${score.streak} in Folge!` : '⭐ Richtig!';
      fb.className = 'feedback correct';
    } else {
      score.wrong++; score.streak = 0;
      fb.textContent = `❌ Falsch! Es war ${formatTime(targetH, targetM)}`;
      fb.className = 'feedback wrong';
    }

    document.getElementById('scoreCorrect').textContent = score.correct;
    document.getElementById('scoreWrong').textContent = score.wrong;
    document.getElementById('streakDisplay').textContent = score.streak;
    document.getElementById('btnCheck').style.display = 'none';
    document.getElementById('btnNext').style.display = '';
  }

  function nextQuestion() { init(); }

  // ── Mode & Difficulty ─────────────────────────────────────────────────────────
  function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.mode-tab').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    init();
  }

  function setDifficulty(d, btn) {
    difficulty = d;
    document.querySelectorAll('.diff-btn').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    init();
  }

  // ── Keyboard ──────────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') answered ? nextQuestion() : checkAnswer();
  });

  init();
</script>
</body>
</html>
