<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrtenbuch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0e0f11;--surface:#16181c;--card:#1e2128;--border:#2a2d35;--accent:#d4f547;--accent2:#47b8f5;--text:#f0f0ed;--muted:#6b7080;--danger:#f54747;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding:0 0 100px}
.header{padding:28px 20px 0}
.hl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:4px}
h1{font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.hm{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:6px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:20px 20px 0}
.sb{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center}
.sv{font-size:20px;font-weight:700;color:var(--accent);line-height:1}
.sl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.1em}
.fc{margin:20px 20px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.ft{font-size:13px;font-weight:700;letter-spacing:.05em;color:var(--accent);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ft::before{content:'';display:block;width:8px;height:8px;background:var(--accent);border-radius:50%}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fi{margin-bottom:10px}
label{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
.aw{position:relative}
.al{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--accent);border-top:none;border-radius:0 0 8px 8px;z-index:100;max-height:180px;overflow-y:auto;display:none}
.ai{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);line-height:1.3;color:var(--text)}
.ai:last-child{border-bottom:none}
.ai:hover{background:var(--surface);color:var(--accent)}
.ai small{display:block;font-size:10px;color:var(--muted);margin-top:2px}
.bc{width:100%;margin-top:4px;background:var(--surface);border:1px dashed var(--accent);color:var(--accent);border-radius:8px;padding:9px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;letter-spacing:.05em}
.bc:hover{background:var(--accent);color:#0e0f11}
.bc:disabled{opacity:.4;cursor:not-allowed}
.kh{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;min-height:14px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.tag{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s;color:var(--muted)}
.tag.active{background:var(--accent);border-color:var(--accent);color:#0e0f11;font-weight:600}
.ba{width:100%;margin-top:14px;background:var(--accent);color:#0e0f11;border:none;border-radius:10px;padding:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s}
.ba:active{transform:scale(.98);opacity:.85}
.lh{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 0}
.lt{font-size:14px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.05em}
.be{background:transparent;border:1px solid var(--accent2);color:var(--accent2);border-radius:8px;padding:7px 14px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s}
.be:hover{background:var(--accent2);color:#0e0f11}
.be:disabled{opacity:.3;cursor:not-allowed}
.fl{padding:12px 20px 0;display:flex;flex-direction:column;gap:8px}
.fk{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;animation:si .2s ease}
@keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.fto{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.fro{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;flex:1;padding-right:10px}
.fkm{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--accent);white-space:nowrap}
.fme{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fd{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.fz{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--muted)}
.frt{background:var(--surface);border:1px solid var(--accent);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--accent)}
.bd{position:absolute;top:10px;right:10px;display:none;background:var(--danger);color:white;border:none;border-radius:6px;width:24px;height:24px;font-size:14px;cursor:pointer;align-items:center;justify-content:center;line-height:1}
.fk:hover .bd{display:flex}
.es{text-align:center;padding:40px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em}
.ei{font-size:36px;margin-bottom:10px;opacity:.4}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#0e0f11;border-radius:30px;padding:10px 22px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header">
  <div class="hl" id="hl">Fahrtenbuch</div>
  <h1>Fahrtenbuch</h1>
  <div class="hm" id="hm">0 Fahrten &middot; 0 km gesamt</div>
</div>
<div class="stats">
  <div class="sb"><div class="sv" id="sF">0</div><div class="sl">Fahrten</div></div>
  <div class="sb"><div class="sv" id="sK">0</div><div class="sl">Km gesamt</div></div>
  <div class="sb"><div class="sv" id="sP">0 &euro;</div><div class="sl">Km-Pauschale</div></div>
</div>
<div class="fc">
  <div class="ft">Fahrt eintragen</div>
  <div class="fr">
    <div class="fi">
      <label>Von</label>
      <div class="aw">
        <input type="text" id="von" placeholder="Startadresse" autocomplete="off">
        <div class="al" id="von-list"></div>
      </div>
    </div>
    <div class="fi">
      <label>Nach</label>
      <div class="aw">
        <input type="text" id="nach" placeholder="Zieladresse" autocomplete="off">
        <div class="al" id="nach-list"></div>
      </div>
    </div>
  </div>
  <div class="fi">
    <button class="bc" id="btnCalc" disabled>&#8635; Kilometer berechnen</button>
    <div class="kh" id="kh"></div>
  </div>
  <div class="fr">
    <div class="fi">
      <label>Kilometer (einfach)</label>
      <input type="number" id="km" placeholder="wird berechnet ..." min="0" step="0.1">
    </div>
    <div class="fi">
      <label>Datum</label>
      <input type="date" id="datum">
    </div>
  </div>
  <div class="fi">
    <label>Hin &amp; Zur&uuml;ck?</label>
    <div class="tags">
      <div class="tag" id="tHin">Nur Hinfahrt</div>
      <div class="tag active" id="tRet">Hin &amp; Zur&uuml;ck (x2)</div>
    </div>
  </div>
  <div class="fi">
    <label>Zweck / Anlass</label>
    <div class="tags" id="tC">
      <div class="tag active">VillageVending</div>
      <div class="tag">Immobilien</div>
      <div class="tag">Jemako</div>
      <div class="tag">Sonstiges</div>
    </div>
    <input type="text" id="zC" placeholder="Eigenen Anlass eingeben ..." style="margin-top:8px">
  </div>
  <button class="ba" id="btnAdd">+ Fahrt hinzuf&uuml;gen</button>
</div>
<div class="lh">
  <div class="lt" id="lt">Meine Fahrten</div>
  <button class="be" id="btnEx" disabled>&#8595; Excel</button>
</div>
<div class="fl" id="fL">
  <div class="es"><div class="ei">&#128663;</div>Noch keine Fahrten eingetragen</div>
</div>
<div class="toast" id="toast"></div>
<script>
var fahrten=JSON.parse(localStorage.getItem('fb')||'[]');
var coords={von:null,nach:null};
var timers={};
var retour=true;

document.getElementById('datum').value=new Date().toISOString().split('T')[0];

document.getElementById('von').addEventListener('input',function(){geo('von',this.value);});
document.getElementById('nach').addEventListener('input',function(){geo('nach',this.value);});
document.getElementById('tHin').addEventListener('click',function(){setRetour(false);});
document.getElementById('tRet').addEventListener('click',function(){setRetour(true);});
document.getElementById('btnCalc').addEventListener('click',calcKm);
document.getElementById('btnAdd').addEventListener('click',addFahrt);
document.getElementById('btnEx').addEventListener('click',exportExcel);

document.querySelectorAll('#tC .tag').forEach(function(t){
  t.addEventListener('click',function(){
    document.querySelectorAll('#tC .tag').forEach(function(x){x.classList.remove('active');});
    t.classList.add('active');
    document.getElementById('zC').value='';
  });
});

document.addEventListener('click',function(e){
  if(!e.target.closest('.aw')){hide('von');hide('nach');}
});

function geo(f,v){
  coords[f]=null;
  updBtn();
  if(v.length<3){hide(f);return;}
  clearTimeout(timers[f]);
  timers[f]=setTimeout(function(){
    fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(v)+'&limit=5&countrycodes=de,at,ch',{headers:{'Accept-Language':'de'}})
    .then(function(r){return r.json();})
    .then(function(d){showList(f,d);})
    .catch(function(){hide(f);});
  },400);
}

function showList(f,res){
  var el=document.getElementById(f+'-list');
  if(!res.length){el.style.display='none';return;}
  el.innerHTML='';
  res.forEach(function(r,i){
    var d=document.createElement('div');
    d.className='ai';
    var parts=r.display_name.split(',');
    d.innerHTML=parts[0]+'<small>'+parts.slice(1,3).join(',')+'</small>';
    d.addEventListener('click',function(){pick(f,r);});
    el.appendChild(d);
  });
  el.style.display='block';
}

function pick(f,r){
  document.getElementById(f).value=r.display_name.split(',').slice(0,2).join(',');
  coords[f]={lat:parseFloat(r.lat),lon:parseFloat(r.lon)};
  hide(f);
  updBtn();
}

function hide(f){document.getElementById(f+'-list').style.display='none';}

function updBtn(){document.getElementById('btnCalc').disabled=!(coords.von&&coords.nach);}

function calcKm(){
  if(!coords.von||!coords.nach)return;
  var btn=document.getElementById('btnCalc');
  var hint=document.getElementById('kh');
  btn.disabled=true;
  btn.textContent='... berechne';
  fetch('https://router.project-osrm.org/route/v1/driving/'+coords.von.lon+','+coords.von.lat+';'+coords.nach.lon+','+coords.nach.lat+'?overview=false')
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.code==='Ok'){
      var km=parseFloat((d.routes[0].distance/1000).toFixed(1));
      document.getElementById('km').value=km;
      var g=retour?(km*2).toLocaleString('de-DE'):km.toLocaleString('de-DE');
      hint.textContent='Strecke: '+km+' km'+(retour?' | Hin & Zurueck: '+g+' km':'');
      hint.style.color='var(--accent)';
    } else {
      hint.textContent='Route nicht gefunden - bitte manuell eingeben';
      hint.style.color='var(--danger)';
    }
    btn.disabled=false;
    btn.textContent='Kilometer berechnen';
  })
  .catch(function(){
    hint.textContent='Verbindungsfehler - bitte manuell eingeben';
    hint.style.color='var(--danger)';
    btn.disabled=false;
    btn.textContent='Kilometer berechnen';
  });
}

function setRetour(v){
  retour=v;
  document.getElementById('tHin').classList.toggle('active',!v);
  document.getElementById('tRet').classList.toggle('active',v);
}

function getZweck(){
  var c=document.getElementById('zC').value.trim();
  if(c)return c;
  var a=document.querySelector('#tC .tag.active');
  return a?a.textContent:'Sonstiges';
}

function addFahrt(){
  var von=document.getElementById('von').value.trim();
  var nach=document.getElementById('nach').value.trim();
  var ke=parseFloat(document.getElementById('km').value);
  var km=retour?parseFloat((ke*2).toFixed(1)):ke;
  var datum=document.getElementById('datum').value;
  var zweck=getZweck();
  if(!von||!nach||!ke||!datum){toast('Bitte alle Felder ausf\u00fcllen');return;}
  fahrten.unshift({id:Date.now(),datum:datum,von:von,nach:nach,km:km,ke:ke,ret:retour,zweck:zweck});
  save();render();toast('Fahrt gespeichert!');
  document.getElementById('von').value='';
  document.getElementById('nach').value='';
  document.getElementById('km').value='';
  document.getElementById('zC').value='';
  document.getElementById('kh').textContent='';
  document.getElementById('datum').value=new Date().toISOString().split('T')[0];
  document.querySelectorAll('#tC .tag').forEach(function(t,i){t.classList.toggle('active',i===0);});
  setRetour(true);
  coords={von:null,nach:null};
  updBtn();
}

function delFahrt(id){
  fahrten=fahrten.filter(function(f){return f.id!==id;});
  save();render();
}

function save(){localStorage.setItem('fb',JSON.stringify(fahrten));}

function render(){
  var now=new Date();
  var mo=now.getMonth(),yr=now.getFullYear();
  var mn=now.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  var dm=fahrten.filter(function(f){var d=new Date(f.datum);return d.getMonth()===mo&&d.getFullYear()===yr;});
  var el=document.getElementById('fL');
  var tot=dm.reduce(function(s,f){return s+f.km;},0);
  var pau=(tot*0.30).toFixed(2);
  document.getElementById('hl').textContent=mn;
  document.getElementById('sF').textContent=dm.length;
  document.getElementById('sK').textContent=tot.toLocaleString('de-DE');
  document.getElementById('sP').textContent=parseFloat(pau).toLocaleString('de-DE',{minimumFractionDigits:0})+' \u20ac';
  document.getElementById('hm').textContent=dm.length+' Fahrten \u00b7 '+tot.toLocaleString('de-DE')+' km';
  document.getElementById('lt').textContent=mn;
  document.getElementById('btnEx').disabled=dm.length===0;
  document.getElementById('btnEx').textContent=now.toLocaleDateString('de-DE',{month:'short'})+' Excel';
  if(!dm.length){el.innerHTML='<div class="es"><div class="ei">&#128663;</div>Noch keine Fahrten im '+now.toLocaleDateString('de-DE',{month:'long'})+'</div>';return;}
  el.innerHTML=dm.map(function(f){
    var ds=new Date(f.datum).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
    var rb=f.ret?'<span class="frt">Hin &amp; Zur\u00fcck</span>':'';
    return '<div class="fk"><button class="bd" onclick="delFahrt('+f.id+')">x</button><div class="fto"><div class="fro">'+f.von+' &rarr; '+f.nach+'</div><div class="fkm">'+f.km.toLocaleString('de-DE')+' km</div></div><div class="fme"><span class="fd">'+ds+'</span><span class="fz">'+f.zweck+'</span>'+rb+'</div></div>';
  }).join('');
}

function exportExcel(){
  var now=new Date();
  var mo=now.getMonth(),yr=now.getFullYear();
  var dm=fahrten.filter(function(f){var d=new Date(f.datum);return d.getMonth()===mo&&d.getFullYear()===yr;});
  if(!dm.length)return;
  var mn=now.toLocaleDateString('de-DE',{month:'long'});
  var tot=dm.reduce(function(s,f){return s+f.km;},0);
  var rows=dm.map(function(f){return{'Datum':new Date(f.datum).toLocaleDateString('de-DE'),'Von':f.von,'Nach':f.nach,'Hin und Zurueck':f.ret?'Ja':'Nein','Kilometer':f.km,'Zweck':f.zweck,'Km-Pauschale':parseFloat((f.km*0.30).toFixed(2))};});
  rows.push({'Datum':'','Von':'','Nach':'GESAMT','Hin und Zurueck':'','Kilometer':tot,'Zweck':'','Km-Pauschale':parseFloat((tot*0.30).toFixed(2))});
  var ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:22},{wch:22},{wch:14},{wch:12},{wch:20},{wch:18}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,mn+' '+yr);
  XLSX.writeFile(wb,'Fahrtenbuch_'+mn+'_'+yr+'.xlsx');
  toast(mn+' '+yr+' wird heruntergeladen');
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

render();
</script>
</body>
</html>
