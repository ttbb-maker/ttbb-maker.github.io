<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrtenbuch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root { --bg:#0e0f11;--surface:#16181c;--card:#1e2128;--border:#2a2d35;--accent:#d4f547;--accent2:#47b8f5;--text:#f0f0ed;--muted:#6b7080;--danger:#f54747;--radius:14px; }
  * { box-sizing:border-box;margin:0;padding:0; }
  body { background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding:0 0 100px 0; }
  .header { padding:28px 20px 0; }
  .header-label { font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:4px; }
  .header h1 { font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1.1; }
  .header-meta { font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:6px; }
  .stats { display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:20px 20px 0; }
  .stat-box { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center; }
  .stat-value { font-size:20px;font-weight:700;color:var(--accent);line-height:1; }
  .stat-label { font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.1em; }
  .form-card { margin:20px 20px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px; }
  .form-title { font-size:13px;font-weight:700;letter-spacing:.05em;color:var(--accent);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px; }
  .form-title::before { content:'';display:block;width:8px;height:8px;background:var(--accent);border-radius:50%; }
  .field-row { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
  .field { margin-bottom:10px; }
  label { display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:5px; }
  input { width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none; }
  input:focus { border-color:var(--accent); }
  input::placeholder { color:var(--muted); }
  .btn-calc { width:100%;margin-top:4px;background:var(--surface);border:1px dashed var(--accent);color:var(--accent);border-radius:8px;padding:9px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;letter-spacing:.05em; }
  .btn-calc:hover { background:var(--accent);color:#0e0f11; }
  .btn-calc:disabled { opacity:.4;cursor:not-allowed; }
  .km-hint { font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;min-height:14px; }
  .tags { display:flex;flex-wrap:wrap;gap:6px;margin-top:4px; }
  .tag { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s;color:var(--muted); }
  .tag.active { background:var(--accent);border-color:var(--accent);color:#0e0f11;font-weight:600; }
  .btn-add { width:100%;margin-top:14px;background:var(--accent);color:#0e0f11;border:none;border-radius:10px;padding:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s; }
  .btn-add:active { transform:scale(.98);opacity:.85; }
  .list-header { display:flex;justify-content:space-between;align-items:center;padding:20px 20px 0; }
  .list-title { font-size:14px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.05em; }
  .btn-export { background:transparent;border:1px solid var(--accent2);color:var(--accent2);border-radius:8px;padding:7px 14px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s; }
  .btn-export:hover { background:var(--accent2);color:#0e0f11; }
  .btn-export:disabled { opacity:.3;cursor:not-allowed; }
  .fahrt-list { padding:12px 20px 0;display:flex;flex-direction:column;gap:8px; }
  .fahrt-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;animation:slideIn .2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .fahrt-top { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px; }
  .fahrt-route { font-size:15px;font-weight:700;color:var(--text);line-height:1.3;flex:1;padding-right:10px; }
  .fahrt-km { font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--accent);white-space:nowrap; }
  .fahrt-meta { display:flex;gap:6px;align-items:center;flex-wrap:wrap; }
  .fahrt-date { font-family:'DM Mono',monospace;font-size:10px;color:var(--muted); }
  .fahrt-zweck { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--muted); }
  .fahrt-retour { background:var(--surface);border:1px solid var(--accent);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--accent); }
  .btn-delete { position:absolute;top:10px;right:10px;display:none;background:var(--danger);color:white;border:none;border-radius:6px;width:24px;height:24px;font-size:14px;cursor:pointer;align-items:center;justify-content:center;line-height:1; }
  .fahrt-card:hover .btn-delete { display:flex; }
  .empty-state { text-align:center;padding:40px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em; }
  .empty-icon { font-size:36px;margin-bottom:10px;opacity:.4; }
  .toast { position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#0e0f11;border-radius:30px;padding:10px 22px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap; }
  .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-label" id="headerLabel">Fahrtenbuch</div>
  <h1>Fahrtenbuch</h1>
  <div class="header-meta" id="headerMeta">0 Fahrten &middot; 0 km gesamt</div>
</div>

<div class="stats">
  <div class="stat-box"><div class="stat-value" id="statFahrten">0</div><div class="stat-label">Fahrten</div></div>
  <div class="stat-box"><div class="stat-value" id="statKm">0</div><div class="stat-label">Km gesamt</div></div>
  <div class="stat-box"><div class="stat-value" id="statPauschale">0 &#8364;</div><div class="stat-label">Km-Pauschale</div></div>
</div>

<div class="form-card">
  <div class="form-title">Fahrt eintragen</div>
  <div class="field-row">
    <div class="field">
      <label>Von</label>
      <input type="text" id="von" placeholder="z.B. Bretten">
    </div>
    <div class="field">
      <label>Nach</label>
      <input type="text" id="nach" placeholder="z.B. Karlsruhe">
    </div>
  </div>
  <div class="field">
    <button class="btn-calc" id="btnCalc" onclick="berechneKm()">&#10227; Kilometer automatisch berechnen</button>
    <div class="km-hint" id="kmHint"></div>
  </div>
  <div class="field-row">
    <div class="field">
      <label>Kilometer (einfach)</label>
      <input type="number" id="km" placeholder="wird berechnet ..." min="0" step="0.1">
    </div>
    <div class="field">
      <label>Datum</label>
      <input type="date" id="datum">
    </div>
  </div>
  <div class="field">
    <label>Hin &amp; Zurueck?</label>
    <div class="tags">
      <div class="tag" id="tagHin" onclick="toggleRetour(false)">Nur Hinfahrt</div>
      <div class="tag active" id="tagRetour" onclick="toggleRetour(true)">Hin &amp; Zurueck (x2)</div>
    </div>
  </div>
  <div class="field">
    <label>Zweck / Anlass</label>
    <div class="tags" id="tagContainer">
      <div class="tag active" onclick="selectTag(this)">VillageVending</div>
      <div class="tag" onclick="selectTag(this)">Immobilien</div>
      <div class="tag" onclick="selectTag(this)">Jemako</div>
      <div class="tag" onclick="selectTag(this)">Sonstiges</div>
    </div>
    <input type="text" id="zweckCustom" placeholder="Oder eigenen Anlass eingeben ..." style="margin-top:8px;">
  </div>
  <button class="btn-add" onclick="addFahrt()">+ Fahrt hinzufuegen</button>
</div>

<div class="list-header">
  <div class="list-title" id="listTitle">Meine Fahrten</div>
  <button class="btn-export" id="exportBtn" onclick="exportExcel()" disabled>&#8595; Excel</button>
</div>

<div class="fahrt-list" id="fahrtList">
  <div class="empty-state"><div class="empty-icon">&#128663;</div>Noch keine Fahrten eingetragen</div>
</div>

<div class="toast" id="toast"></div>

<script>
  var fahrten = JSON.parse(localStorage.getItem('fahrten') || '[]');
  var isRetour = true;

  document.getElementById('datum').value = new Date().toISOString().split('T')[0];

  // Kilometer berechnen: Adresse -> Koordinaten -> Route
  async function berechneKm() {
    var von = document.getElementById('von').value.trim();
    var nach = document.getElementById('nach').value.trim();
    if (!von || !nach) { showToast('Bitte Von und Nach eingeben'); return; }

    var btn = document.getElementById('btnCalc');
    var hint = document.getElementById('kmHint');
    btn.disabled = true;
    btn.textContent = '... berechne Route';
    hint.textContent = 'Suche Adressen...';
    hint.style.color = 'var(--muted)';

    try {
      // Geocode Von
      var resVon = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(von) + '&limit=1&countrycodes=de,at,ch', { headers: {'Accept-Language':'de'} });
      var dataVon = await resVon.json();
      if (!dataVon.length) { hint.textContent = 'Startort nicht gefunden - bitte genauer eingeben'; hint.style.color='var(--danger)'; btn.disabled=false; btn.textContent='Kilometer automatisch berechnen'; return; }

      // Geocode Nach
      var resNach = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(nach) + '&limit=1&countrycodes=de,at,ch', { headers: {'Accept-Language':'de'} });
      var dataNach = await resNach.json();
      if (!dataNach.length) { hint.textContent = 'Zielort nicht gefunden - bitte genauer eingeben'; hint.style.color='var(--danger)'; btn.disabled=false; btn.textContent='Kilometer automatisch berechnen'; return; }

      hint.textContent = 'Berechne Strecke...';

      var lonVon = dataVon[0].lon; var latVon = dataVon[0].lat;
      var lonNach = dataNach[0].lon; var latNach = dataNach[0].lat;

      // Route berechnen
      var resRoute = await fetch('https://router.project-osrm.org/route/v1/driving/' + lonVon + ',' + latVon + ';' + lonNach + ',' + latNach + '?overview=false');
      var dataRoute = await resRoute.json();

      if (dataRoute.code === 'Ok') {
        var km = parseFloat((dataRoute.routes[0].distance / 1000).toFixed(1));
        document.getElementById('km').value = km;
        var gesamt = isRetour ? (km * 2).toLocaleString('de-DE') : km.toLocaleString('de-DE');
        hint.textContent = 'Strecke: ' + km.toLocaleString('de-DE') + ' km' + (isRetour ? ' - Hin & Zurueck: ' + gesamt + ' km' : '');
        hint.style.color = 'var(--accent)';
      } else {
        hint.textContent = 'Route nicht gefunden - km manuell eingeben';
        hint.style.color = 'var(--danger)';
      }
    } catch(e) {
      hint.textContent = 'Fehler: ' + e.message;
      hint.style.color = 'var(--danger)';
    }
    btn.disabled = false;
    btn.textContent = 'Kilometer automatisch berechnen';
  }

  function toggleRetour(val) {
    isRetour = val;
    document.getElementById('tagHin').classList.toggle('active', !val);
    document.getElementById('tagRetour').classList.toggle('active', val);
    var kmVal = parseFloat(document.getElementById('km').value);
    if (kmVal) {
      document.getElementById('kmHint').textContent = isRetour ? 'Hin & Zurueck: ' + (kmVal*2).toLocaleString('de-DE') + ' km' : 'Nur Hinfahrt: ' + kmVal.toLocaleString('de-DE') + ' km';
      document.getElementById('kmHint').style.color = 'var(--accent)';
    }
  }

  function selectTag(el) {
    document.querySelectorAll('#tagContainer .tag').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('zweckCustom').value = '';
  }

  function getZweck() {
    var custom = document.getElementById('zweckCustom').value.trim();
    if (custom) return custom;
    var active = document.querySelector('#tagContainer .tag.active');
    return active ? active.textContent : 'Sonstiges';
  }

  function addFahrt() {
    var von = document.getElementById('von').value.trim();
    var nach = document.getElementById('nach').value.trim();
    var kmEinfach = parseFloat(document.getElementById('km').value);
    var km = isRetour ? parseFloat((kmEinfach * 2).toFixed(1)) : kmEinfach;
    var datum = document.getElementById('datum').value;
    var zweck = getZweck();

    if (!von || !nach || !kmEinfach || !datum) { showToast('Bitte alle Felder ausfuellen'); return; }

    fahrten.unshift({ id: Date.now(), datum:datum, von:von, nach:nach, km:km, kmEinfach:kmEinfach, retour:isRetour, zweck:zweck });
    save(); render();
    showToast('Fahrt gespeichert!');

    document.getElementById('von').value = '';
    document.getElementById('nach').value = '';
    document.getElementById('km').value = '';
    document.getElementById('zweckCustom').value = '';
    document.getElementById('kmHint').textContent = '';
    document.getElementById('datum').value = new Date().toISOString().split('T')[0];
    document.querySelectorAll('#tagContainer .tag').forEach(function(t,i){ t.classList.toggle('active', i===0); });
    isRetour = true;
    document.getElementById('tagHin').classList.remove('active');
    document.getElementById('tagRetour').classList.add('active');
  }

  function deleteFahrt(id) {
    fahrten = fahrten.filter(function(f){ return f.id !== id; });
    save(); render();
  }

  function save() { localStorage.setItem('fahrten', JSON.stringify(fahrten)); }

  function render() {
    var now = new Date();
    var monat = now.getMonth();
    var jahr = now.getFullYear();
    var monatsName = now.toLocaleDateString('de-DE', {month:'long', year:'numeric'});

    var diesenMonat = fahrten.filter(function(f){
      var d = new Date(f.datum);
      return d.getMonth()===monat && d.getFullYear()===jahr;
    });

    var list = document.getElementById('fahrtList');
    var totalKm = diesenMonat.reduce(function(s,f){ return s+f.km; }, 0);
    var pauschale = (totalKm * 0.30).toFixed(2);

    document.getElementById('headerLabel').textContent = monatsName;
    document.getElementById('statFahrten').textContent = diesenMonat.length;
    document.getElementById('statKm').textContent = totalKm.toLocaleString('de-DE');
    document.getElementById('statPauschale').textContent = parseFloat(pauschale).toLocaleString('de-DE',{minimumFractionDigits:0}) + ' EUR';
    document.getElementById('headerMeta').textContent = diesenMonat.length + ' Fahrten - ' + totalKm.toLocaleString('de-DE') + ' km gesamt';
    document.getElementById('listTitle').textContent = monatsName;
    document.getElementById('exportBtn').disabled = diesenMonat.length === 0;
    document.getElementById('exportBtn').textContent = now.toLocaleDateString('de-DE',{month:'short'}) + ' Excel';

    if (diesenMonat.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128663;</div>Noch keine Fahrten im ' + now.toLocaleDateString('de-DE',{month:'long'}) + '</div>';
      return;
    }

    list.innerHTML = diesenMonat.map(function(f){
      var d = new Date(f.datum);
      var dateStr = d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
      var retourBadge = f.retour ? '<span class="fahrt-retour">Hin &amp; Zurueck</span>' : '';
      return '<div class="fahrt-card"><button class="btn-delete" onclick="deleteFahrt('+f.id+')" title="Loeschen">x</button><div class="fahrt-top"><div class="fahrt-route">'+f.von+' &rarr; '+f.nach+'</div><div class="fahrt-km">'+f.km.toLocaleString('de-DE')+' km</div></div><div class="fahrt-meta"><span class="fahrt-date">'+dateStr+'</span><span class="fahrt-zweck">'+f.zweck+'</span>'+retourBadge+'</div></div>';
    }).join('');
  }

  function exportExcel() {
    var now = new Date();
    var monat = now.getMonth();
    var jahr = now.getFullYear();
    var diesenMonat = fahrten.filter(function(f){ var d=new Date(f.datum); return d.getMonth()===monat&&d.getFullYear()===jahr; });
    if (!diesenMonat.length) return;
    var monatsName = now.toLocaleDateString('de-DE',{month:'long'});
    var totalKm = diesenMonat.reduce(function(s,f){ return s+f.km; },0);
    var rows = diesenMonat.map(function(f){
      return { 'Datum': new Date(f.datum).toLocaleDateString('de-DE'), 'Von': f.von, 'Nach': f.nach, 'Hin und Zurueck': f.retour?'Ja':'Nein', 'Kilometer': f.km, 'Zweck': f.zweck, 'Km-Pauschale (0,30 EUR)': parseFloat((f.km*0.30).toFixed(2)) };
    });
    rows.push({'Datum':'','Von':'','Nach':'GESAMT','Hin und Zurueck':'','Kilometer':totalKm,'Zweck':'','Km-Pauschale (0,30 EUR)':parseFloat((totalKm*0.30).toFixed(2))});
    var ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:12},{wch:22},{wch:22},{wch:14},{wch:12},{wch:20},{wch:22}];
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, monatsName+' '+jahr);
    XLSX.writeFile(wb, 'Fahrtenbuch_'+monatsName+'_'+jahr+'.xlsx');
    showToast(monatsName+' '+jahr+' wird heruntergeladen');
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
  }

  render();
</script>
</body>
</html>
