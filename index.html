<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrtenbuch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --card: #1e2128;
    --border: #2a2d35;
    --accent: #d4f547;
    --accent2: #47b8f5;
    --text: #f0f0ed;
    --muted: #6b7080;
    --danger: #f54747;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 100px 0;
  }

  /* Header */
  .header {
    padding: 28px 20px 0;
    position: relative;
  }
  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Stats bar */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 20px 20px 0;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    text-align: center;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Form card */
  .form-card {
    margin: 20px 20px 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .form-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .form-title::before {
    content: '';
    display: block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field-row.full { grid-template-columns: 1fr; }

  .field {
    margin-bottom: 10px;
  }
  label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }
  input::placeholder { color: var(--muted); }
  select option { background: var(--surface); }

  /* Autocomplete */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--card);
    border: 1px solid var(--accent);
    border-top: none;
    border-radius: 0 0 8px 8px;
    z-index: 100;
    max-height: 180px;
    overflow-y: auto;
  }
  .autocomplete-item {
    padding: 9px 12px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    line-height: 1.3;
    color: var(--text);
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover { background: var(--surface); color: var(--accent); }
  .autocomplete-item small { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* km berechnen button */
  .btn-calc {
    width: 100%;
    margin-top: 4px;
    background: var(--surface);
    border: 1px dashed var(--accent);
    color: var(--accent);
    border-radius: 8px;
    padding: 9px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-calc:hover { background: var(--accent); color: #0e0f11; }
  .btn-calc:disabled { opacity: 0.4; cursor: not-allowed; }
  .km-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    min-height: 14px;
  }

  /* Zweck tags */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .tag {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }
  .tag.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0f11;
    font-weight: 600;
  }

  /* Submit button */
  .btn-add {
    width: 100%;
    margin-top: 14px;
    background: var(--accent);
    color: #0e0f11;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-add:active { transform: scale(0.98); opacity: 0.85; }

  /* Fahrten Liste */
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 20px 0;
  }
  .list-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .btn-export {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-export:hover {
    background: var(--accent2);
    color: #0e0f11;
  }
  .btn-export:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Fahrt card */
  .fahrt-list {
    padding: 12px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .fahrt-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    position: relative;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fahrt-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .fahrt-route {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
    padding-right: 10px;
  }
  .fahrt-km {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
  }
  .fahrt-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .fahrt-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .fahrt-zweck {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .btn-delete {
    position: absolute;
    top: 10px;
    right: 10px;
    display: none;
    background: var(--danger);
    color: white;
    border: none;
    border-radius: 6px;
    width: 24px;
    height: 24px;
    font-size: 14px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .fahrt-card:hover .btn-delete { display: flex; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
  }
  .empty-icon {
    font-size: 36px;
    margin-bottom: 10px;
    opacity: 0.4;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #0e0f11;
    border-radius: 30px;
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label" id="headerLabel">Steuerjahr 2026</div>
  <h1>Fahrtenbuch</h1>
  <div class="header-meta" id="headerMeta">0 Fahrten · 0 km gesamt</div>
</div>

<div class="stats">
  <div class="stat-box">
    <div class="stat-value" id="statFahrten">0</div>
    <div class="stat-label">Fahrten</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="statKm">0</div>
    <div class="stat-label">Km gesamt</div>
  </div>
  <div class="stat-box">
    <div class="stat-value" id="statPauschale">0 €</div>
    <div class="stat-label">Km-Pauschale</div>
  </div>
</div>

<div class="form-card">
  <div class="form-title">Fahrt eintragen</div>

  <div class="field-row">
    <div class="field">
      <label>Von</label>
      <div class="autocomplete-wrap">
        <input type="text" id="von" placeholder="Startadresse" autocomplete="off" oninput="geocodeInput('von')">
        <div class="autocomplete-list" id="von-list" style="display:none"></div>
      </div>
    </div>
    <div class="field">
      <label>Nach</label>
      <div class="autocomplete-wrap">
        <input type="text" id="nach" placeholder="Zieladresse" autocomplete="off" oninput="geocodeInput('nach')">
        <div class="autocomplete-list" id="nach-list" style="display:none"></div>
      </div>
    </div>
  </div>

  <div class="field">
    <button class="btn-calc" id="btnCalc" onclick="berechneKm()" disabled>⟳ Kilometer automatisch berechnen</button>
    <div class="km-hint" id="kmHint"></div>
  </div>

  <div class="field-row">
    <div class="field">
      <label>Kilometer</label>
      <input type="number" id="km" placeholder="wird berechnet …" min="0" step="0.1">
    </div>
    <div class="field">
      <label>Datum</label>
      <input type="date" id="datum">
    </div>
  </div>

  <div class="field">
    <label>Zweck / Anlass</label>
    <div class="tags" id="tagContainer">
      <div class="tag active" onclick="selectTag(this)">VillageVending</div>
      <div class="tag" onclick="selectTag(this)">Immobilien</div>
      <div class="tag" onclick="selectTag(this)">Jemako</div>
      <div class="tag" onclick="selectTag(this)">Sonstiges</div>
    </div>
    <input type="text" id="zweckCustom" placeholder="Oder eigenen Anlass eingeben …" style="margin-top:8px;">
  </div>

  <div class="field">
    <label>Hin & Zurück?</label>
    <div class="tags">
      <div class="tag" id="tagHin" onclick="toggleRetour(false)">Nur Hinfahrt</div>
      <div class="tag active" id="tagRetour" onclick="toggleRetour(true)">Hin & Zurück (×2)</div>
    </div>
  </div>

  <button class="btn-add" onclick="addFahrt()">+ Fahrt hinzufügen</button>
</div>

<div class="list-header">
  <div class="list-title" id="listTitle">Meine Fahrten</div>
  <button class="btn-export" id="exportBtn" onclick="exportExcel()" disabled>↓ Excel</button>
</div>

<div class="fahrt-list" id="fahrtList">
  <div class="empty-state">
    <div class="empty-icon">🚗</div>
    Noch keine Fahrten eingetragen
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let fahrten = JSON.parse(localStorage.getItem('fahrten') || '[]');
  let coords = { von: null, nach: null };
  let acTimers = {};

  document.getElementById('datum').value = new Date().toISOString().split('T')[0];

  // ── Autocomplete via Nominatim ──────────────────────────────
  async function geocodeInput(field) {
    const val = document.getElementById(field).value.trim();
    coords[field] = null;
    updateCalcBtn();

    if (val.length < 3) {
      hideList(field);
      return;
    }
    clearTimeout(acTimers[field]);
    acTimers[field] = setTimeout(async () => {
      try {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}&limit=5&addressdetails=1&countrycodes=de,at,ch`;
        const res = await fetch(url, { headers: { 'Accept-Language': 'de' } });
        const data = await res.json();
        showList(field, data);
      } catch(e) { hideList(field); }
    }, 350);
  }

  function showList(field, results) {
    const list = document.getElementById(field + '-list');
    if (!results.length) { list.style.display = 'none'; return; }
    list.innerHTML = results.map((r, i) => {
      const main = r.namedetails?.name || r.display_name.split(',')[0];
      const sub  = r.display_name.split(',').slice(1, 3).join(',').trim();
      return `<div class="autocomplete-item" onclick="selectPlace('${field}', ${i})">
        ${main}<small>${sub}</small>
      </div>`;
    }).join('');
    list._data = results;
    list.style.display = 'block';
  }

  function selectPlace(field, idx) {
    const list = document.getElementById(field + '-list');
    const r = list._data[idx];
    const label = r.display_name.split(',').slice(0,2).join(',').trim();
    document.getElementById(field).value = label;
    coords[field] = { lat: parseFloat(r.lat), lon: parseFloat(r.lon) };
    hideList(field);
    updateCalcBtn();
  }

  function hideList(field) {
    document.getElementById(field + '-list').style.display = 'none';
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.autocomplete-wrap')) {
      hideList('von'); hideList('nach');
    }
  });

  function updateCalcBtn() {
    document.getElementById('btnCalc').disabled = !(coords.von && coords.nach);
  }

  // ── Routing via OSRM ──────────────────────────────────────────
  async function berechneKm() {
    if (!coords.von || !coords.nach) return;
    const btn = document.getElementById('btnCalc');
    const hint = document.getElementById('kmHint');
    btn.disabled = true;
    btn.textContent = '… berechne Route';
    hint.textContent = '';

    try {
      const url = `https://router.project-osrm.org/route/v1/driving/${coords.von.lon},${coords.von.lat};${coords.nach.lon},${coords.nach.lat}?overview=false`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.code === 'Ok') {
        const km = (data.routes[0].distance / 1000).toFixed(1);
        document.getElementById('km').value = km;
        const gesamt = isRetour ? (parseFloat(km) * 2).toLocaleString('de-DE') : parseFloat(km).toLocaleString('de-DE');
        hint.textContent = `✓ Route: ${parseFloat(km).toLocaleString('de-DE')} km · ${isRetour ? 'Hin & Zurück: ' + gesamt + ' km' : 'Nur Hinfahrt'}`;
        hint.style.color = 'var(--accent)';
      } else {
        hint.textContent = '⚠️ Route nicht gefunden – km manuell eingeben';
        hint.style.color = 'var(--danger)';
      }
    } catch(e) {
      hint.textContent = '⚠️ Verbindungsfehler – km manuell eingeben';
      hint.style.color = 'var(--danger)';
    }
    btn.disabled = false;
    btn.textContent = '⟳ Kilometer automatisch berechnen';
  }

  // ── Rest der App ────────────────────────────────────────────
  let isRetour = true;

  function toggleRetour(val) {
    isRetour = val;
    document.getElementById('tagHin').classList.toggle('active', !val);
    document.getElementById('tagRetour').classList.toggle('active', val);
    // km-Feld Hinweis aktualisieren
    const kmVal = parseFloat(document.getElementById('km').value);
    if (kmVal) {
      document.getElementById('kmHint').textContent = isRetour
        ? `✓ Hin & Zurück: ${(kmVal * 2).toLocaleString('de-DE')} km gesamt`
        : `✓ Nur Hinfahrt: ${kmVal.toLocaleString('de-DE')} km`;
    }
  }
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('zweckCustom').value = '';
  }

  function getZweck() {
    const custom = document.getElementById('zweckCustom').value.trim();
    if (custom) return custom;
    const active = document.querySelector('.tag.active');
    return active ? active.textContent : 'Sonstiges';
  }

  function addFahrt() {
    const von = document.getElementById('von').value.trim();
    const nach = document.getElementById('nach').value.trim();
    const kmEinfach = parseFloat(document.getElementById('km').value);
    const km = isRetour ? parseFloat((kmEinfach * 2).toFixed(1)) : kmEinfach;
    const datum = document.getElementById('datum').value;
    const zweck = getZweck();

    if (!von || !nach || !km || !datum) {
      showToast('⚠️ Bitte alle Felder ausfüllen');
      return;
    }

    fahrten.unshift({ id: Date.now(), datum, von, nach, km, zweck });
    save();
    render();
    showToast('✓ Fahrt gespeichert');

    document.getElementById('von').value = '';
    document.getElementById('nach').value = '';
    document.getElementById('km').value = '';
    document.getElementById('zweckCustom').value = '';
    document.getElementById('kmHint').textContent = '';
    document.getElementById('datum').value = new Date().toISOString().split('T')[0];
    document.querySelectorAll('.tag').forEach((t, i) => t.classList.toggle('active', i === 0));
    isRetour = true;
    document.getElementById('tagHin').classList.remove('active');
    document.getElementById('tagRetour').classList.add('active');
    coords = { von: null, nach: null };
    updateCalcBtn();
  }

  function deleteFahrt(id) {
    fahrten = fahrten.filter(f => f.id !== id);
    save();
    render();
  }

  function save() {
    localStorage.setItem('fahrten', JSON.stringify(fahrten));
  }

  function render() {
    const now = new Date();
    const monat = now.getMonth();
    const jahr  = now.getFullYear();
    const monatsName = now.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });

    // Nur Fahrten des aktuellen Monats anzeigen
    const diesenMonat = fahrten.filter(f => {
      const d = new Date(f.datum);
      return d.getMonth() === monat && d.getFullYear() === jahr;
    });

    const list = document.getElementById('fahrtList');
    const totalKm = diesenMonat.reduce((s, f) => s + f.km, 0);
    const pauschale = (totalKm * 0.30).toFixed(2);

    document.getElementById('headerLabel').textContent = monatsName;
    document.getElementById('statFahrten').textContent = diesenMonat.length;
    document.getElementById('statKm').textContent = totalKm.toLocaleString('de-DE');
    document.getElementById('statPauschale').textContent = parseFloat(pauschale).toLocaleString('de-DE', {minimumFractionDigits: 0}) + ' €';
    document.getElementById('headerMeta').textContent = `${diesenMonat.length} Fahrten · ${totalKm.toLocaleString('de-DE')} km gesamt`;
    document.getElementById('listTitle').textContent = monatsName;
    document.getElementById('exportBtn').disabled = diesenMonat.length === 0;
    document.getElementById('exportBtn').textContent = `↓ ${now.toLocaleDateString('de-DE', { month: 'short' })} Excel`;

    if (diesenMonat.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">🚗</div>Noch keine Fahrten im ${now.toLocaleDateString('de-DE', { month: 'long' })}</div>`;
      return;
    }

    list.innerHTML = diesenMonat.map(f => {
      const d = new Date(f.datum);
      const dateStr = d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });
      return `
        <div class="fahrt-card">
          <button class="btn-delete" onclick="deleteFahrt(${f.id})" title="Löschen">×</button>
          <div class="fahrt-top">
            <div class="fahrt-route">${f.von} → ${f.nach}</div>
            <div class="fahrt-km">${f.km.toLocaleString('de-DE')} km</div>
          </div>
          <div class="fahrt-meta">
            <span class="fahrt-date">${dateStr}</span>
            <span class="fahrt-zweck">${f.zweck}</span>
          </div>
        </div>`;
    }).join('');
  }

  function exportExcel() {
    const now = new Date();
    const monat = now.getMonth();
    const jahr  = now.getFullYear();

    const diesenMonat = fahrten.filter(f => {
      const d = new Date(f.datum);
      return d.getMonth() === monat && d.getFullYear() === jahr;
    });

    if (diesenMonat.length === 0) return;

    const monatsName = now.toLocaleDateString('de-DE', { month: 'long' });
    const totalKm = diesenMonat.reduce((s, f) => s + f.km, 0);

    const rows = diesenMonat.map(f => ({
      'Datum': new Date(f.datum).toLocaleDateString('de-DE'),
      'Von': f.von,
      'Nach': f.nach,
      'Kilometer': f.km,
      'Zweck / Anlass': f.zweck,
      'Km-Pauschale (0,30 €)': parseFloat((f.km * 0.30).toFixed(2))
    }));
    rows.push({ 'Datum': '', 'Von': '', 'Nach': 'GESAMT', 'Kilometer': totalKm, 'Zweck / Anlass': '', 'Km-Pauschale (0,30 €)': parseFloat((totalKm * 0.30).toFixed(2)) });

    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{ wch: 12 }, { wch: 24 }, { wch: 24 }, { wch: 12 }, { wch: 22 }, { wch: 22 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, `${monatsName} ${jahr}`);
    XLSX.writeFile(wb, `Fahrtenbuch_${monatsName}_${jahr}.xlsx`);
    showToast(`📊 ${monatsName} ${jahr} wird heruntergeladen …`);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  render();
</script>
</body>
</html>
