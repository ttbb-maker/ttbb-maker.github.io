<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrtenbuch</title>
<style>
  :root { --bg:#0e0f11;--surface:#16181c;--card:#1e2128;--border:#2a2d35;--accent:#d4f547;--accent2:#47b8f5;--text:#f0f0ed;--muted:#6b7080;--danger:#f54747;--radius:14px; }
  * { box-sizing:border-box;margin:0;padding:0; }
  body { background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding:0 0 100px 0; }
  .header { padding:28px 20px 0; }
  .header-label { font-size:10px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:4px; }
  .header h1 { font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1.1; }
  .header-meta { font-size:11px;color:var(--muted);margin-top:6px; }
  .stats { display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:20px 20px 0; }
  .stat-box { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center; }
  .stat-value { font-size:20px;font-weight:700;color:var(--accent);line-height:1; }
  .stat-label { font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.1em; }
  .form-card { margin:20px 20px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px; }
  .form-title { font-size:13px;font-weight:700;letter-spacing:.05em;color:var(--accent);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px; }
  .form-title::before { content:'';display:block;width:8px;height:8px;background:var(--accent);border-radius:50%; }
  .field-row { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
  .field { margin-bottom:10px; }
  label { display:block;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:5px; }
  input { width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none; }
  input:focus { border-color:var(--accent); }
  input::placeholder { color:var(--muted); }
  .btn-calc { width:100%;margin-top:4px;background:var(--surface);border:1px dashed var(--accent);color:var(--accent);border-radius:8px;padding:9px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s; }
  .btn-calc:active { background:var(--accent);color:#0e0f11; }
  .km-hint { font-size:11px;color:var(--muted);margin-top:4px;min-height:16px; }
  .tags { display:flex;flex-wrap:wrap;gap:6px;margin-top:4px; }
  .tag { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;color:var(--muted); }
  .tag.active { background:var(--accent);border-color:var(--accent);color:#0e0f11;font-weight:700; }
  .btn-add { width:100%;margin-top:14px;background:var(--accent);color:#0e0f11;border:none;border-radius:10px;padding:15px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer; }
  .btn-add:active { opacity:.8; }
  .list-header { display:flex;justify-content:space-between;align-items:center;padding:20px 20px 0; }
  .list-title { font-size:14px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.05em; }
  .btn-export { background:transparent;border:1px solid var(--accent2);color:var(--accent2);border-radius:8px;padding:8px 16px;font-family:inherit;font-size:12px;cursor:pointer; }
  .btn-export:disabled { opacity:.3;cursor:not-allowed; }
  .data-bar { display:flex;gap:8px;padding:12px 20px 0;justify-content:flex-end; }
  .btn-data { background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 14px;font-family:inherit;font-size:11px;cursor:pointer; }
  .btn-data:hover { border-color:var(--accent);color:var(--accent); }
  .monat-select { background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:inherit;font-size:12px;padding:7px 10px;outline:none;cursor:pointer;width:auto; }
  .monat-select:focus { border-color:var(--accent); }
  .fahrt-list { padding:12px 20px 0;display:flex;flex-direction:column;gap:8px; }
  .fahrt-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative; }
  .fahrt-top { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px; }
  .fahrt-route { font-size:15px;font-weight:700;color:var(--text);line-height:1.3;flex:1;padding-right:10px; }
  .fahrt-km { font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap; }
  .fahrt-meta { display:flex;gap:6px;align-items:center;flex-wrap:wrap; }
  .fahrt-date { font-size:11px;color:var(--muted); }
  .fahrt-zweck { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--muted); }
  .fahrt-retour { border:1px solid var(--accent);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--accent); }
  .btn-delete { position:absolute;top:10px;right:10px;display:none;background:var(--danger);color:white;border:none;border-radius:6px;width:26px;height:26px;font-size:16px;cursor:pointer;align-items:center;justify-content:center; }
  .fahrt-card:hover .btn-delete,.fahrt-card:active .btn-delete { display:flex; }
  .empty-state { text-align:center;padding:40px 20px;color:var(--muted);font-size:13px; }
  .empty-icon { font-size:40px;margin-bottom:12px;opacity:.4; }
  .toast { position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#0e0f11;border-radius:30px;padding:10px 22px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap; }
  .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-label" id="headerLabel">Fahrtenbuch</div>
  <h1>Fahrtenbuch</h1>
  <div class="header-meta" id="headerMeta">0 Fahrten &middot; 0 km gesamt</div>
</div>

<div class="stats">
  <div class="stat-box"><div class="stat-value" id="statFahrten">0</div><div class="stat-label">Fahrten</div></div>
  <div class="stat-box"><div class="stat-value" id="statKm">0</div><div class="stat-label">Km gesamt</div></div>
  <div class="stat-box"><div class="stat-value" id="statPauschale">0 &#8364;</div><div class="stat-label">Km-Pauschale</div></div>
</div>

<div class="form-card">
  <div class="form-title">Fahrt eintragen</div>
  <div class="field-row">
    <div class="field">
      <label>Von</label>
      <div class="tags" style="margin-bottom:6px;">
        <div class="tag" onclick="selectVon(this)">Hüffenhardt</div>
        <div class="tag" onclick="selectVon(this)">Bad Rappenau Fürfeld</div>
      </div>
      <input type="text" id="von" placeholder="z.B. Bretten">
    </div>
    <div class="field">
      <label>Nach</label>
      <input type="text" id="nach" placeholder="z.B. Karlsruhe">
    </div>
  </div>
  <div class="field">
    <button class="btn-calc" id="btnCalc" onclick="berechneKm()">&#10227; Kilometer automatisch berechnen</button>
    <div class="km-hint" id="kmHint"></div>
  </div>
  <div class="field-row">
    <div class="field">
      <label>Kilometer (einfach)</label>
      <input type="number" id="km" placeholder="wird berechnet ..." min="0" step="0.1">
    </div>
    <div class="field">
      <label>Datum</label>
      <input type="date" id="datum">
    </div>
  </div>
  <div class="field">
    <label>Hin &amp; Zurueck?</label>
    <div class="tags">
      <div class="tag" id="tagHin" onclick="toggleRetour(false)">Nur Hinfahrt</div>
      <div class="tag active" id="tagRetour" onclick="toggleRetour(true)">Hin &amp; Zurueck (x2)</div>
    </div>
  </div>
  <div class="field">
    <label>Zweck / Anlass</label>
    <div class="tags" id="tagContainer">
      <div class="tag active" onclick="selectTag(this)">VillageVending</div>
      <div class="tag" onclick="selectTag(this)">Immobilien</div>
      <div class="tag" onclick="selectTag(this)">Jemako</div>
      <div class="tag" onclick="selectTag(this)">Sonstiges</div>
    </div>
    <input type="text" id="zweckCustom" placeholder="Oder eigenen Anlass eingeben ..." style="margin-top:8px;">
  </div>
  <button class="btn-add" onclick="addFahrt()">+ Fahrt hinzufuegen</button>
</div>

<div class="list-header">
  <div class="list-title" id="listTitle">Meine Fahrten</div>
  <input type="month" id="monatSelect" class="monat-select" onchange="render()">
  <button class="btn-export" id="exportBtn" onclick="exportCSV()" disabled>&#8595; Export</button>
</div>

<div class="data-bar">
  <button class="btn-data" onclick="exportJSON()">&#8593; Daten sichern</button>
  <label class="btn-data" style="cursor:pointer;">&#8595; Daten importieren<input type="file" accept=".json" onchange="importJSON(this)" style="display:none;"></label>
</div>

<div class="fahrt-list" id="fahrtList">
  <div class="empty-state"><div class="empty-icon">&#128663;</div>Noch keine Fahrten eingetragen</div>
</div>

<div class="toast" id="toast"></div>

<script>
var API_URL = 'https://tonibader.synology.me/api.php';
var API_KEY = 'fb_k7mP9xQr2nLw';

var fahrten = [];
var isRetour = true;

document.getElementById('datum').value = new Date().toISOString().split('T')[0];
var _now0 = new Date();
document.getElementById('monatSelect').value = _now0.getFullYear() + '-' + String(_now0.getMonth()+1).padStart(2,'0');

async function loadFahrten() {
  var local = JSON.parse(localStorage.getItem('fahrten') || '[]');
  try {
    var r = await fetch(API_URL, {headers:{'X-API-Key':API_KEY}});
    if (r.ok) {
      var remote = await r.json();
      // Nur übernehmen wenn API Daten hat, sonst lokale behalten
      fahrten = remote.length > 0 ? remote : local;
    } else {
      fahrten = local;
    }
  } catch(e) {
    fahrten = local;
    showToast('Offline – lokale Daten geladen');
  }
  render();
}

async function berechneKm() {
  var von = document.getElementById('von').value.trim();
  var nach = document.getElementById('nach').value.trim();
  if (!von || !nach) { showToast('Bitte Von und Nach eingeben!'); return; }

  var btn = document.getElementById('btnCalc');
  var hint = document.getElementById('kmHint');
  btn.disabled = true;
  btn.textContent = '... berechne Route';
  hint.textContent = 'Suche Orte...';
  hint.style.color = 'var(--muted)';

  try {
    var r1 = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(von) + '&limit=1&countrycodes=de,at,ch');
    var d1 = await r1.json();
    if (!d1.length) { hint.textContent = '"' + von + '" nicht gefunden - genauer eingeben'; hint.style.color='var(--danger)'; btn.disabled=false; btn.textContent='Kilometer automatisch berechnen'; return; }

    var r2 = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(nach) + '&limit=1&countrycodes=de,at,ch');
    var d2 = await r2.json();
    if (!d2.length) { hint.textContent = '"' + nach + '" nicht gefunden - genauer eingeben'; hint.style.color='var(--danger)'; btn.disabled=false; btn.textContent='Kilometer automatisch berechnen'; return; }

    hint.textContent = 'Berechne Strecke...';

    var r3 = await fetch('https://router.project-osrm.org/route/v1/driving/' + d1[0].lon + ',' + d1[0].lat + ';' + d2[0].lon + ',' + d2[0].lat + '?overview=false');
    var d3 = await r3.json();

    if (d3.code === 'Ok') {
      var km = parseFloat((d3.routes[0].distance / 1000).toFixed(1));
      document.getElementById('km').value = km;
      var gesamt = isRetour ? (km * 2).toLocaleString('de-DE') : km.toLocaleString('de-DE');
      hint.textContent = 'Strecke: ' + km.toLocaleString('de-DE') + ' km' + (isRetour ? ' - Hin & Zurueck: ' + gesamt + ' km' : '');
      hint.style.color = 'var(--accent)';
    } else {
      hint.textContent = 'Route nicht gefunden - km manuell eingeben';
      hint.style.color = 'var(--danger)';
    }
  } catch(e) {
    hint.textContent = 'Kein Internet oder Fehler: ' + e.message;
    hint.style.color = 'var(--danger)';
  }
  btn.disabled = false;
  btn.textContent = 'Kilometer automatisch berechnen';
}

function toggleRetour(val) {
  isRetour = val;
  document.getElementById('tagHin').classList.toggle('active', !val);
  document.getElementById('tagRetour').classList.toggle('active', val);
  var kmVal = parseFloat(document.getElementById('km').value);
  if (kmVal) {
    document.getElementById('kmHint').textContent = isRetour ? 'Hin & Zurueck: ' + (kmVal*2).toLocaleString('de-DE') + ' km' : 'Nur Hinfahrt: ' + kmVal.toLocaleString('de-DE') + ' km';
    document.getElementById('kmHint').style.color = 'var(--accent)';
  }
}

function selectVon(el) {
  document.querySelectorAll('#von').forEach(function(){});
  document.querySelectorAll('.tags .tag[onclick^="selectVon"]').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('von').value = el.textContent;
}

function selectTag(el) {
  document.querySelectorAll('#tagContainer .tag').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('zweckCustom').value = '';
}

function getZweck() {
  var c = document.getElementById('zweckCustom').value.trim();
  if (c) return c;
  var a = document.querySelector('#tagContainer .tag.active');
  return a ? a.textContent : 'Sonstiges';
}

function addFahrt() {
  var von = document.getElementById('von').value.trim();
  var nach = document.getElementById('nach').value.trim();
  var kmE = parseFloat(document.getElementById('km').value);
  var km = isRetour ? parseFloat((kmE*2).toFixed(1)) : kmE;
  var datum = document.getElementById('datum').value;
  var zweck = getZweck();
  if (!von||!nach||!kmE||!datum) { showToast('Bitte alle Felder ausfuellen!'); return; }
  fahrten.unshift({id:Date.now(),datum:datum,von:von,nach:nach,km:km,kmE:kmE,retour:isRetour,zweck:zweck});
  save(); render();
  showToast('Fahrt gespeichert!');
  document.getElementById('von').value='';
  document.getElementById('nach').value='';
  document.getElementById('km').value='';
  document.getElementById('zweckCustom').value='';
  document.getElementById('kmHint').textContent='';
  document.getElementById('datum').value=new Date().toISOString().split('T')[0];
  document.querySelectorAll('#tagContainer .tag').forEach(function(t,i){t.classList.toggle('active',i===0);});
  isRetour=true;
  document.getElementById('tagHin').classList.remove('active');
  document.getElementById('tagRetour').classList.add('active');
}

function deleteFahrt(id) {
  fahrten=fahrten.filter(function(f){return f.id!==id;});
  save(); render();
}

async function save() {
  localStorage.setItem('fahrten',JSON.stringify(fahrten));
  try {
    var r = await fetch(API_URL, {method:'POST',headers:{'X-API-Key':API_KEY,'Content-Type':'application/json'},body:JSON.stringify(fahrten)});
    return r.ok;
  } catch(e) { return false; }
}

function render() {
  var msv=document.getElementById('monatSelect').value;
  var parts=msv.split('-');
  var j=parseInt(parts[0]),m=parseInt(parts[1])-1;
  var sel=new Date(j,m,1);
  var mn=sel.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  var dm=fahrten.filter(function(f){var d=new Date(f.datum);return d.getMonth()===m&&d.getFullYear()===j;});
  var list=document.getElementById('fahrtList');
  var tkm=dm.reduce(function(s,f){return s+f.km;},0);
  var p=(tkm*0.30).toFixed(2);
  document.getElementById('headerLabel').textContent=mn;
  document.getElementById('statFahrten').textContent=dm.length;
  document.getElementById('statKm').textContent=tkm.toLocaleString('de-DE');
  document.getElementById('statPauschale').textContent=parseFloat(p).toLocaleString('de-DE',{minimumFractionDigits:0})+' EUR';
  document.getElementById('headerMeta').textContent=dm.length+' Fahrten - '+tkm.toLocaleString('de-DE')+' km gesamt';
  document.getElementById('listTitle').textContent=mn;
  document.getElementById('exportBtn').disabled=dm.length===0;
  document.getElementById('exportBtn').textContent=sel.toLocaleDateString('de-DE',{month:'short'})+' CSV';
  if (!dm.length) { list.innerHTML='<div class="empty-state"><div class="empty-icon">&#128663;</div>Noch keine Fahrten im '+sel.toLocaleDateString('de-DE',{month:'long'})+'</div>'; return; }
  list.innerHTML=dm.map(function(f){
    var d=new Date(f.datum);
    var ds=d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
    var rb=f.retour?'<span class="fahrt-retour">Hin & Zurueck</span>':'';
    return '<div class="fahrt-card"><button class="btn-delete" onclick="deleteFahrt('+f.id+')">x</button><div class="fahrt-top"><div class="fahrt-route">'+f.von+' &rarr; '+f.nach+'</div><div class="fahrt-km">'+f.km.toLocaleString('de-DE')+' km</div></div><div class="fahrt-meta"><span class="fahrt-date">'+ds+'</span><span class="fahrt-zweck">'+f.zweck+'</span>'+rb+'</div></div>';
  }).join('');
}

function exportCSV() {
  var msv=document.getElementById('monatSelect').value;
  var parts=msv.split('-');
  var j=parseInt(parts[0]),m=parseInt(parts[1])-1;
  var sel=new Date(j,m,1);
  var dm=fahrten.filter(function(f){var d=new Date(f.datum);return d.getMonth()===m&&d.getFullYear()===j;});
  if (!dm.length) return;
  var mn=sel.toLocaleDateString('de-DE',{month:'long'});
  var tkm=dm.reduce(function(s,f){return s+f.km;},0);
  var rows=['Datum;Von;Nach;Hin und Zurueck;Kilometer;Zweck;Km-Pauschale (0,30 EUR)'];
  dm.forEach(function(f){
    rows.push(new Date(f.datum).toLocaleDateString('de-DE')+';'+f.von+';'+f.nach+';'+(f.retour?'Ja':'Nein')+';'+f.km+';'+f.zweck+';'+parseFloat((f.km*0.30).toFixed(2)));
  });
  rows.push(';;GESAMT;;'+tkm+';;'+parseFloat((tkm*0.30).toFixed(2)));
  var blob=new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='Fahrtenbuch_'+mn+'_'+j+'.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast(mn+' '+j+' wird heruntergeladen');
}

function exportJSON() {
  var blob=new Blob([JSON.stringify(fahrten,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='Fahrtenbuch_Backup.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('Backup gespeichert!');
}

function importJSON(input) {
  var file=input.files[0];
  if (!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try {
      var data=JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error();
      var neu=0;
      var ids=new Set(fahrten.map(function(f){return f.id;}));
      data.forEach(function(f){if(!ids.has(f.id)){fahrten.push(f);neu++;}});
      fahrten.sort(function(a,b){return new Date(b.datum)-new Date(a.datum);});
      render();
      save().then(function(ok){
        showToast(ok ? neu+' Fahrten importiert & gespeichert!' : neu+' Fahrten importiert (nur lokal)');
      });
    } catch(e) { showToast('Ungueltige Datei!'); }
  };
  reader.readAsText(file);
  input.value='';
}

function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

loadFahrten();
</script>
</body>
</html>
